$("debug-add-gems").onclick = () => {
  state.metaGems += 500;
  saveProgress();
  renderLobby();
};

// 개발용 데이터 초기화 (확인 2번)
$("debug-reset").onclick = () => {
  const ok1 = confirm("⚠️ 모든 진행도가 사라집니다.\n\n- 보유 몬스터: 스타팅 5마리만 남음\n- 잼: 0으로 리셋\n- 사탕: 전부 사라짐\n\n계속할까요?");
  if (!ok1) return;
  const ok2 = confirm("정말 초기화할까요?\n이 작업은 되돌릴 수 없습니다.");
  if (!ok2) return;

  // localStorage 완전 제거 → loadProgress 호출하면 신규 사용자처럼 초기화됨
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  state.ownedMons = [...STARTER_MON_IDS];
  state.metaGems = 0;
  state.candies = {};
  lastGachaType = null;
  saveProgress();
  renderLobby();
  alert("초기화 완료. 새 게임을 시작하세요.");
};

// ===== 페이지 이탈 경고 (배틀 중에만) =====
window.addEventListener("beforeunload", (e) => {
  if ($("battle-screen").classList.contains("active")) {
    e.preventDefault();
    e.returnValue = "진행 중인 런이 사라져요. 정말 나가시겠어요?";
    return e.returnValue;
  }
});

// 스킬 상세 모달 표시
function openSkillDetail(moveKey) {
  const move = MOVES[moveKey];
  if (!move) return;
  const modal = document.getElementById("skill-detail-modal");
  const body  = document.getElementById("skill-detail-body");
  const iconHtml = move.icon
    ? `<img src="images/${move.icon}" class="sd-icon-img" alt="">`
    : `<div class="sd-icon-fallback">⚔️</div>`;

  // 효과 설명 텍스트로 변환
  const effectLines = [];
  const eList = move.effects || [];
  eList.forEach(e => {
    const recipient = (e.target === "enemy") ? "상대" : "자신";
    if (e.kind === "heal") {
      effectLines.push(`💚 ${recipient} HP ${e.value}% 회복`);
    } else if (e.kind === "burn") {
      effectLines.push(`🔥 ${recipient} 화상: 매 턴 최대HP의 ${e.value}% (${e.duration}턴)`);
    } else if (e.kind === "trapped") {
      effectLines.push(`🚫 ${recipient} 교체 불가 (${e.duration}턴)`);
    } else if (e.kind === "cleanse") {
      effectLines.push(`✨ ${recipient}의 모든 부정적 효과 해제`);
    } else if (e.kind === "phoenix_revive") {
      effectLines.push(`🔥 첫 사망 시 부활 (HP 50%, 영구 능력치 +15%)`);
    } else {
      const def = EFFECT_DEFS[e.kind];
      if (def) {
        const sign = def.sign > 0 ? "+" : "-";
        effectLines.push(`${def.icon} ${recipient} ${def.label} ${sign}${e.value}% (${e.duration}턴)`);
      }
    }
  });

  // 조건부 스킬
  let conditionalHtml = "";
  if (move.conditional) {
    const c = move.conditional;
    const parts = [];
    parts.push(`<div class="sd-section"><div class="sd-section-title">⚡ HP > ${c.hpThreshold}% 일 때</div>`);
    parts.push(`<div>데미지 ×${c.above.multiplier}</div>`);
    (c.above.effects || []).forEach(e => {
      const def = EFFECT_DEFS[e.kind];
      const r = e.target === "enemy" ? "상대" : "자신";
      if (def) parts.push(`<div>${def.icon} ${r} ${def.label} ${def.sign > 0 ? "+" : "-"}${e.value}% (${e.duration}턴)</div>`);
    });
    parts.push(`</div>`);
    parts.push(`<div class="sd-section"><div class="sd-section-title">💧 HP ≤ ${c.hpThreshold}% 일 때</div>`);
    parts.push(`<div>데미지 ×${c.below.multiplier}</div>`);
    (c.below.effects || []).forEach(e => {
      const r = e.target === "enemy" ? "상대" : "자신";
      if (e.kind === "heal") parts.push(`<div>💚 ${r} HP ${e.value}% 회복</div>`);
      else {
        const def = EFFECT_DEFS[e.kind];
        if (def) parts.push(`<div>${def.icon} ${r} ${def.label} ${def.sign > 0 ? "+" : "-"}${e.value}% (${e.duration}턴)</div>`);
      }
    });
    parts.push(`</div>`);
    conditionalHtml = parts.join("");
  }

  // 메인 메타
  let metaParts = [];
  if (move.conditional) metaParts.push(`<span>조건부</span>`);
  else if (move.multiplier !== undefined) metaParts.push(`<span>데미지 ${move.multiplier === 0 ? "없음" : "×" + move.multiplier}</span>`);
  else if (move.power) metaParts.push(`<span>위력 ${move.power}</span>`);
  if (move.onceBattle) metaParts.push(`<span>판당 1회</span>`);
  else if (move.cooldown && move.cooldown > 0) metaParts.push(`<span>쿨 ${move.cooldown}턴</span>`);
  if (move.priority && move.priority > 0) metaParts.push(`<span>⚡ 선제기</span>`);

  body.innerHTML = `
    <div class="sd-header">
      <div class="sd-icon">${iconHtml}</div>
      <div class="sd-title-wrap">
        <div class="sd-name">${move.name}</div>
        <span class="type-badge type-${move.type}">${TYPES[move.type].name}</span>
      </div>
    </div>
    <div class="sd-meta">${metaParts.join("")}</div>
    ${move.desc ? `<div class="sd-desc">${move.desc}</div>` : ""}
    ${conditionalHtml}
    ${effectLines.length ? `<div class="sd-effects-title">상세 효과</div><div class="sd-effects">${effectLines.map(l => `<div class="sd-effect-line">${l}</div>`).join("")}</div>` : ""}
  `;
  modal.classList.add("show");
}
function closeSkillDetail() {
  document.getElementById("skill-detail-modal").classList.remove("show");
}

// 초기화
loadProgress();  // 영구 진행도 먼저 로드
renderLobby();   // 로비 잼 표시
$("battle-field").style.backgroundImage = `url(${BACKGROUND})`;
renderStartScreen();
</script>
