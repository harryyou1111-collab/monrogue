          <div class="shop-desc">상태이상 치료. 60코인</div>
        </div>
        <button class="shop-buy" ${state.inventory.coins < SHOP_PRICES.antidote ? 'disabled' : ''} onclick="buyItem('antidote')">구매</button>
      </div>
      <div class="shop-row">
        <div class="shop-icon">🎯</div>
        <div class="shop-info">
          <div class="shop-name">잡기 도구</div>
          <div class="shop-desc">야생 몬스터 잡기에 사용. 35코인</div>
        </div>
        <button class="shop-buy" ${state.inventory.coins < SHOP_PRICES.ball ? 'disabled' : ''} onclick="buyItem('ball')">구매</button>
      </div>
    </div>`;
  } else if (shopTab === "gacha") {
    html += `<div class="shop-grid">
      <div class="shop-row">
        <div class="shop-icon">🎰</div>
        <div class="shop-info">
          <div class="shop-name">아이템 뽑기</div>
          <div class="shop-desc">100코인. 회복약 60% / 잡기도구 30% / 슈퍼회복(100%) 10%</div>
        </div>
        <button class="shop-buy" ${state.inventory.coins < SHOP_PRICES.gacha ? 'disabled' : ''} onclick="doGacha()">뽑기!</button>
      </div>
    </div>`;
  }

  html += `<button class="modal-close" onclick="closeModal()">닫기</button>`;
  modal.innerHTML = html;
}

function switchShopTab(tab) {
  shopTab = tab;
  renderShopModal();
}

function buyItem(item) {
  if (item === "potion") {
    if (state.inventory.coins < SHOP_PRICES.potion) return;
    state.inventory.coins -= SHOP_PRICES.potion;
    state.inventory.potions += 1;
  } else if (item === "ball") {
    if (state.inventory.coins < SHOP_PRICES.ball) return;
    state.inventory.coins -= SHOP_PRICES.ball;
    state.inventory.balls += 1;
  } else if (item === "antidote") {
    if (state.inventory.coins < SHOP_PRICES.antidote) return;
    state.inventory.coins -= SHOP_PRICES.antidote;
    state.inventory.antidotes += 1;
  }
  updateTopbar();
  renderShopModal();
}

function useAntidote() {
  const p = getActive();
  if (state.inventory.antidotes <= 0 || !p.status) return;
  state.inventory.antidotes -= 1;
  const cured = STATUS_INFO[p.status].name;
  p.status = null;
  p.sleepTurns = 0;
  // sprite 상태 클래스 제거
  ["burn","paralyze","sleep","poison","fear"].forEach(s => $("player-sprite").classList.remove(`status-${s}`));
  renderMonStatus("player", p);
  renderPlayer();
  renderParty();
  renderShopModal();
  // 잠깐 메시지 (모달 닫지 않음)
  flashMessage(`🧪 ${p.name}의 ${cured} 상태가 치료됐다!`);
}

function doGacha() {
  if (state.inventory.coins < SHOP_PRICES.gacha) return;
  state.inventory.coins -= SHOP_PRICES.gacha;

  const r = Math.random();
  let resultMsg, resultIcon;
  if (r < 0.6) {
    state.inventory.potions += 1;
    resultMsg = "회복약 획득!"; resultIcon = "💊";
  } else if (r < 0.9) {
    state.inventory.balls += 1;
    resultMsg = "잡기 도구 획득!"; resultIcon = "🎯";
  } else {
    // 슈퍼 회복: 활성 몬스터 풀회복 + 상태이상 치료
    const p = getActive();
    p.currentHp = p.maxHp;
    p.status = null;
    p.sleepTurns = 0;
    ["burn","paralyze","sleep","poison","fear"].forEach(s => $("player-sprite").classList.remove(`status-${s}`));
    resultMsg = `슈퍼 회복! ${p.name} 완전 회복`; resultIcon = "✨";
    renderPlayer();
    renderParty();
  }

  // 결과 카드
  const modal = $("modal-content");
  modal.innerHTML = `
    <div class="modal-title">🎰 뽑기 결과</div>
    <div class="capture-card">
      <div style="font-size:80px; margin-bottom:14px;">${resultIcon}</div>
      <div class="capture-name">${resultMsg}</div>
    </div>
    <button class="modal-close" onclick="backToShop()">계속</button>
  `;
  updateTopbar();
}

function backToShop() {
  shopTab = "inventory";
  renderShopModal();
}

function usePotion() {
  const p = getActive();
  if (state.inventory.potions <= 0 || p.currentHp >= p.maxHp) return;
  state.inventory.potions -= 1;
  const heal = Math.floor(p.maxHp * 0.5);
  const before = p.currentHp;
  p.currentHp = Math.min(p.maxHp, p.currentHp + heal);
  const actualHeal = p.currentHp - before;
  popHeal("player", actualHeal);
  renderPlayer();
  renderParty();
  renderShopModal();
}

function closeModal() {
  $("modal-bg").classList.remove("show");
}

// ===== 메시지 시스템 =====
function queueMessage(text) { state.messageQueue.push({ type: "msg", text }); }
function queueAction(fn) { state.messageQueue.push({ type: "act", fn }); }
function startMessages() { state.awaitingTap = false; processNextMessage(); }

function processNextMessage() {
  if (state.messageQueue.length === 0) {
    $("message-box").classList.remove("tap");
    return;
  }
  const item = state.messageQueue.shift();
  if (item.type === "act") {
    item.fn();
    processNextMessage();
  } else {
    $("message-box").textContent = item.text;
    if (state.messageQueue.length > 0) {
      $("message-box").classList.add("tap");
      state.awaitingTap = true;
    } else {
      $("message-box").classList.remove("tap");
    }
  }
}

function advanceMessage() {
  if (state.awaitingTap) {
    state.awaitingTap = false;
    processNextMessage();
  }
}

async function showMessage(text, delay = 800) {
  $("message-box").textContent = text;
  $("message-box").classList.remove("tap");
  await sleep(delay);
}

function flashMessage(text) {
  $("message-box").textContent = text;
  $("message-box").classList.remove("tap");
}

// ===== 게임오버 =====
function endGame() {
  if (!window._bestScore) window._bestScore = 0;
  if (state.score > window._bestScore) window._bestScore = state.score;

  $("final-wave").textContent = state.wave;
  $("final-kills").textContent = state.kills;
  $("final-caught").textContent = state.caught;
  $("final-gems").textContent = state.inventory.gems;
  $("final-score").textContent = state.score;
  $("best-score").textContent = window._bestScore;

  showScreen("gameover-screen");
}

function restartGame() {
  state.selectedMonId = null;
  document.querySelectorAll(".mon-card").forEach(c => c.classList.remove("selected"));
  $("preview-detail").classList.remove("show");
  const btn = $("start-btn");
  btn.disabled = true;
  btn.textContent = "몬스터를 선택하세요";
  renderLobby();  // 잼 표시 업데이트 (단계 D에서 metaGems 가산 후)
  showScreen("lobby-screen");
}

// ===== 로비 화면 =====
function renderLobby() {
  $("lobby-gems").textContent = state.metaGems;
}

// ===== 도감 화면 =====
function renderCollection() {
  $("collection-count").textContent = `${state.ownedMons.length} / ${ALL_MON_IDS.length}`;
  const grid = $("collection-grid");
  grid.innerHTML = "";
  ALL_MON_IDS.forEach(id => {
    const mon = MONSTERS[id];
    const owned = state.ownedMons.includes(id);
    const candyCount = state.candies[id] || 0;
    const card = document.createElement("div");
    card.className = `collection-card rarity-${mon.rarity || 'common'}${owned ? '' : ' locked'}`;
    card.innerHTML = `
      ${owned && candyCount > 0 ? `<div class="collection-candy">🍬 ${candyCount}</div>` : ''}
      <img src="${IMAGES[id]}" alt="${owned ? mon.name : '???'}">
      <div class="collection-card-name">${owned ? mon.name : '???'}</div>
      ${owned ? `<div class="collection-card-type type-${mon.type}">${TYPES[mon.type].name}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

// ===== 뽑기 시스템 =====
// 등급 확률 (단계 C 합의: 75/20/5)
const GACHA_RATES = { common: 75, rare: 20, legendary: 5 };

function rollRarity() {
  const r = Math.random() * 100;
  if (r < GACHA_RATES.legendary) return "legendary";
  if (r < GACHA_RATES.legendary + GACHA_RATES.rare) return "rare";
  return "common";
}

function doGacha() {
  const cost = SHOP_PRICES.gacha;
  if (state.metaGems < cost) return;
  const btn = $("gacha-pull-btn");
  if (btn.disabled) return;  // 이중클릭 방지
  btn.disabled = true;

  state.metaGems -= cost;

  // 등급 결정 → 해당 등급 풀에서 랜덤 (풀이 비면 fallback)
  let rarity = rollRarity();
  let pool = GACHA_POOL_IDS.filter(id => (MONSTERS[id].rarity || 'common') === rarity);
  if (pool.length === 0) {
    const fallbackOrder = ["common", "rare", "legendary"];
    for (const r of fallbackOrder) {
      pool = GACHA_POOL_IDS.filter(id => (MONSTERS[id].rarity || 'common') === r);
      if (pool.length > 0) { rarity = r; break; }
    }
  }
  if (pool.length === 0) {
    state.metaGems += cost;
    alert("뽑기 풀이 비어있습니다");
    btn.disabled = false;
    return;
  }

  const pulledId = pickRandom(pool);
  const isNew = !state.ownedMons.includes(pulledId);
  if (isNew) state.ownedMons.push(pulledId);
  else state.candies[pulledId] = (state.candies[pulledId] || 0) + 1;
  saveProgress();
  updateGachaUI();  // 잼 표시는 즉시 갱신

  playGachaAnimation(pulledId, isNew, rarity);
}

// ===== 뽑기 연출 (단계별) =====
function playGachaAnimation(monId, isNew, rarity) {
  const area = $("gacha-pull-area");

  // 1단계: 흔들림 (전설 1.4초 / 레어 1.0초 / 일반 0.7초)
  const suspenseTime = rarity === "legendary" ? 1400 : rarity === "rare" ? 1000 : 700;
  area.classList.add("suspense");
  area.innerHTML = `
    <div style="text-align:center; position:relative; z-index:2;">
      <div class="gacha-machine-anim">🎰</div>
    </div>
  `;

  setTimeout(() => {
    // 2단계: 폭발 + 광선
    area.innerHTML = `
      ${rarity !== "common" ? `<div class="gacha-rays ${rarity === "rare" ? "rare" : ""}"></div>` : ""}
      <div class="gacha-burst ${rarity}"></div>
    `;
    // 전설은 화면 전체 플래시
    if (rarity === "legendary") {
      const flash = document.createElement("div");
      flash.className = "gacha-screen-flash";
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 700);
    }

    // 3단계: 카드 등장 (전설 0.9초 후 / 레어 0.7초 / 일반 0.5초)
    const cardDelay = rarity === "legendary" ? 900 : rarity === "rare" ? 700 : 500;
    setTimeout(() => {
      renderGachaResult(monId, isNew, rarity);
      $("gacha-pull-btn").disabled = state.metaGems < SHOP_PRICES.gacha;
    }, cardDelay);
  }, suspenseTime);
}

function renderGachaResult(monId, isNew, rarityOverride) {
  const mon = MONSTERS[monId];
  const rarityClass = rarityOverride || mon.rarity || 'common';
  const rarityLabel = rarityClass === 'legendary' ? '★ 전설' : rarityClass === 'rare' ? '◆ 레어' : '일반';
  $("gacha-pull-area").classList.remove("suspense");
  $("gacha-pull-area").innerHTML = `
    ${rarityClass !== "common" ? `<div class="gacha-rays ${rarityClass === "rare" ? "rare" : ""}" style="opacity:0.6;"></div>` : ""}
    <div class="gacha-result-card rarity-${rarityClass}" style="position:relative; z-index:2;">
      ${isNew
        ? '<div class="gacha-new-badge">NEW!</div>'
        : `<div class="gacha-candy-badge">🍬 사탕 +1 (보유 ${state.candies[monId]})</div>`}
      <div class="gacha-rarity-label rarity-${rarityClass}">${rarityLabel}</div>
      <img src="${IMAGES[monId]}" alt="${mon.name}">
      <div class="gacha-result-name">${mon.name}</div>
      <span class="gacha-result-type type-${mon.type}">${TYPES[mon.type].name}</span>
    </div>
  `;
}

function updateGachaUI() {
  $("gacha-gems").textContent = state.metaGems;
  const btn = $("gacha-pull-btn");
  const canAfford = state.metaGems >= SHOP_PRICES.gacha;
  btn.disabled = !canAfford;
  $("gacha-pull-label").textContent = canAfford
    ? `1회 뽑기 (${SHOP_PRICES.gacha} 💎)`
    : `잼 부족 (${state.metaGems} / ${SHOP_PRICES.gacha})`;
}

// ===== 로비 버튼 이벤트 =====
$("lobby-battle-btn").onclick = () => {
  renderStartScreen();  // 새로 뽑은 몬도 즉시 반영
  showScreen("start-screen");
};
$("lobby-collection-btn").onclick = () => {
  renderCollection();
  showScreen("collection-screen");
};
$("lobby-gacha-btn").onclick = () => {
  updateGachaUI();
  // 이전 결과 초기화 (placeholder 복귀)
  const area = $("gacha-pull-area");
  area.classList.remove("suspense");
  area.innerHTML = `
    <div class="gacha-placeholder">
      <div class="gacha-machine-icon">🎰</div>
      <div class="gacha-rates">
        <div>★ 전설 <span style="color:#ffd34e">5%</span></div>
        <div>◆ 레어 <span style="color:#60a5fa">20%</span></div>
        <div>일반 <span style="color:#aaa">75%</span></div>
      </div>
    </div>
  `;
  showScreen("gacha-screen");
};
$("collection-back").onclick = () => showScreen("lobby-screen");
$("gacha-back").onclick = () => {
  renderLobby();  // 잼 변동 반영
  showScreen("lobby-screen");
};
$("gacha-pull-btn").onclick = doGacha;
$("select-back-btn").onclick = () => {
  // 선택 상태 리셋
  state.selectedMonId = null;
  document.querySelectorAll(".mon-card").forEach(c => c.classList.remove("selected"));
  $("preview-detail").classList.remove("show");
  const sb = $("start-btn");
  sb.disabled = true;
  sb.textContent = "몬스터를 선택하세요";
  showScreen("lobby-screen");
};

// 개발용 임시 잼 추가 (단계 D 완성 후 제거 예정)
$("debug-add-gems").onclick = () => {
  state.metaGems += 500;
  saveProgress();
  renderLobby();
};

// ===== 페이지 이탈 경고 (배틀 중에만) =====
window.addEventListener("beforeunload", (e) => {
  if ($("battle-screen").classList.contains("active")) {
    e.preventDefault();
    e.returnValue = "진행 중인 런이 사라져요. 정말 나가시겠어요?";
    return e.returnValue;
  }
});

// 초기화
loadProgress();  // 영구 진행도 먼저 로드
renderLobby();   // 로비 잼 표시
$("battle-field").style.backgroundImage = `url(${BACKGROUND})`;
renderStartScreen();
</script>
