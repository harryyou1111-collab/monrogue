<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MonRogue v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0a1228;
    --bg-mid: #162447;
    --bg-card: #1e2d5a;
    --bg-card-light: #2a3d7a;
    --accent: #ffd34e;
    --accent-hot: #ff8a3d;
    --gold: #f6c84c;
    --text: #f5f5f5;
    --text-dim: #a0aec0;
    --hp-high: #4ade80;
    --hp-mid: #fbbf24;
    --hp-low: #ef4444;
    --exp-bar: #60a5fa;
    --type-fire: #ff5722;
    --type-water: #2196f3;
    --type-grass: #4caf50;
    --type-electric: #fbbf24;
    --type-dark: #5e35b1;
    --type-spirit: #9c27b0;
    --type-normal: #757575;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: var(--bg-dark);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255, 138, 61, 0.08), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(33, 150, 243, 0.08), transparent 40%);
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
  }

  .screen { display: none; padding: 16px; min-height: 100vh; }
  .screen.active { display: block; }

  h1, h2, h3 {
    font-family: 'Black Han Sans', sans-serif;
    font-weight: normal;
    letter-spacing: 0.5px;
  }

  .btn {
    font-family: 'Jua', sans-serif;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 17px;
    color: var(--text);
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.1s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-hot)); color: #1a1a1a; font-weight: 700; }
  .btn-secondary { background: var(--bg-card-light); }
  .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); }

  /* ===== 시작 화면 ===== */
  .title-block { text-align: center; padding: 30px 0 24px; }
  .title-main {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 56px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hot) 60%, #ff5722 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: 2px;
    filter: drop-shadow(0 4px 8px rgba(255, 138, 61, 0.3));
  }
  .title-sub {
    font-family: 'Jua', sans-serif;
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 14px;
    letter-spacing: 4px;
  }

  .section-label {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    color: var(--accent);
    margin: 18px 0 12px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .monster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .mon-card {
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 12px 10px 10px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .mon-card:active { transform: scale(0.97); }
  .mon-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255, 211, 78, 0.4);
    background: var(--bg-card-light);
  }
  /* 등급별 스타일 */
  .mon-card.rarity-rare {
    border-color: rgba(96, 165, 250, 0.5);
    box-shadow: 0 0 12px rgba(96, 165, 250, 0.2);
  }
  .mon-card.rarity-legendary {
    border-color: rgba(255, 211, 78, 0.6);
    box-shadow: 0 0 16px rgba(255, 211, 78, 0.3);
    background: linear-gradient(135deg, var(--bg-card) 0%, #2d2552 100%);
  }
  .mon-card.rarity-legendary.selected,
  .mon-card.rarity-rare.selected {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255, 211, 78, 0.5);
  }
  .rarity-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-family: 'Jua', sans-serif;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    color: white;
    font-weight: 700;
    z-index: 2;
  }
  .rarity-badge.rare {
    background: linear-gradient(135deg, #60a5fa, #2563eb);
    box-shadow: 0 0 6px rgba(96, 165, 250, 0.5);
  }
  .rarity-badge.legend {
    background: linear-gradient(135deg, #ffd34e, #ff8a3d);
    color: #1a1a1a;
    box-shadow: 0 0 8px rgba(255, 211, 78, 0.6);
  }
  .mon-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    background: radial-gradient(circle at 50% 60%, rgba(255,211,78,0.12), transparent 70%);
    border-radius: 10px;
    display: block;
  }
  .mon-card-name { font-family: 'Jua', sans-serif; text-align: center; margin-top: 8px; font-size: 17px; }
  .mon-card-type {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 99px;
    margin-top: 4px;
    font-weight: 700;
    color: white;
  }
  .mon-card-info { text-align: center; }

  .start-btn-wrap {
    position: sticky;
    bottom: 16px;
    margin-top: 24px;
    padding-top: 16px;
    background: linear-gradient(180deg, transparent, var(--bg-dark) 40%);
  }
  .start-btn-wrap .btn { width: 100%; font-size: 19px; padding: 18px; }

  .preview-detail {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 14px;
    margin-top: 14px;
    display: none;
  }
  .preview-detail.show { display: block; }
  .preview-detail-name { font-family: 'Black Han Sans', sans-serif; font-size: 22px; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
  .stat-pill { background: var(--bg-dark); border-radius: 8px; padding: 6px 4px; text-align: center; }
  .stat-pill-label { font-size: 10px; color: var(--text-dim); }
  .stat-pill-value { font-family: 'Jua', sans-serif; font-size: 18px; color: var(--accent); }

  /* ===== 배틀 화면 상단 ===== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-card);
    padding: 8px 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    gap: 10px;
  }
  .topbar-item { display: flex; align-items: center; gap: 4px; font-family: 'Jua', sans-serif; }
  .topbar-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; }
  .topbar-value { font-family: 'Black Han Sans', sans-serif; font-size: 18px; color: var(--accent); }
  .topbar-icon { font-size: 16px; }

  /* 파티 표시 */
  .party-display {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .party-slot {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 2px solid var(--bg-card-light);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .party-slot.active {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(255, 211, 78, 0.5);
  }
  .party-slot.fainted { opacity: 0.4; filter: grayscale(1); }
  .party-slot.empty { background: rgba(255,255,255,0.05); border-style: dashed; }
  .party-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .party-slot-hp {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(0,0,0,0.4);
  }
  .party-slot-hp-fill {
    height: 100%;
    background: var(--hp-high);
    transition: width 0.3s;
  }
  .party-slot-hp-fill.mid { background: var(--hp-mid); }
  .party-slot-hp-fill.low { background: var(--hp-low); }

  /* ===== 배틀 필드 ===== */
  .battle-field {
    border-radius: 16px;
    padding: 12px;
    position: relative;
    border: 3px solid var(--bg-card);
    overflow: hidden;
    aspect-ratio: 16/12;
    background-size: cover;
    background-position: center 70%;
    background-repeat: no-repeat;
  }
  /* 배경 상단 어두운 오버레이 (캐릭터 정보 카드 가독성용) */
  .battle-field::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.25) 100%);
    pointer-events: none;
    z-index: 0;
  }
  /* 보스 모드: 빨간 오버레이 + 진동 효과 */
  .battle-field.boss-mode::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(220,38,38,0.15) 0%, rgba(127,17,17,0.35) 80%, rgba(60,5,5,0.5) 100%);
    pointer-events: none;
    z-index: 0;
    animation: boss-pulse 2s ease-in-out infinite;
  }
  @keyframes boss-pulse {
    0%, 100% { opacity: 0.9; }
    50% { opacity: 0.65; }
  }
  .battle-field.boss-mode {
    border-color: #dc2626;
    box-shadow: 0 0 20px rgba(220,38,38,0.4), inset 0 0 20px rgba(220,38,38,0.2);
  }
  .enemy-row, .player-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    position: relative;
    z-index: 1;
  }
  /* enemy: sprite를 오른쪽으로 */
  .enemy-row { flex-direction: row-reverse; }
  /* player: sprite를 왼쪽으로 (기본) */
  .player-row { margin-top: 6px; }

  .sprite-wrap {
    flex: 0 0 130px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    perspective: 500px;
  }
  /* 바닥 그림자 (별도 요소) */
  .sprite-shadow {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 14px;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), rgba(0,0,0,0) 70%);
    z-index: 0;
    animation: shadow-pulse 2.4s ease-in-out infinite;
  }
  @keyframes shadow-pulse {
    0%, 100% { transform: translateX(-50%) scale(1, 1); opacity: 0.85; }
    50%      { transform: translateX(-50%) scale(0.82, 0.7); opacity: 0.55; }
  }
  /* 캐릭터 이미지: idle 떠다님 + 마주보기 기울임 */
  .sprite-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35));
    transition: filter 0.2s;
    transform-origin: bottom center;
    --flip: 1;
    animation: idle-bob 2.4s ease-in-out infinite;
  }
  /* flipped 클래스가 있으면 좌우 반전 */
  .sprite-wrap.flipped img { --flip: -1; }

  @keyframes idle-bob {
    0%, 100% { transform: scaleX(var(--flip)) rotateY(-12deg) translateY(0); }
    50%      { transform: scaleX(var(--flip)) rotateY(-12deg) translateY(-6px); }
  }

  /* 공격 대시 */
  .sprite-wrap.attacking img { animation: dash-anim 0.5s ease-out; }
  @keyframes dash-anim {
    0%   { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(0); }
    35%  { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(28px) scale(1.06); }
    100% { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(0); }
  }

  /* 피격 흔들림 + 빨갛게 */
  .sprite-wrap.hit img { animation: shake-anim 0.45s; }
  @keyframes shake-anim {
    0%,100% { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(0); }
    15% { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(-10px); filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)) brightness(1.7) sepia(0.8) saturate(4) hue-rotate(-25deg); }
    35% { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(10px); }
    55% { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(-7px); }
    75% { transform: scaleX(var(--flip)) rotateY(-12deg) translateX(7px); }
  }

  /* 쓰러짐 */
  .sprite-wrap.faint img { animation: faint-anim 0.9s forwards; }
  @keyframes faint-anim {
    0%   { opacity: 1; transform: scaleX(var(--flip)) rotateY(-12deg) translateY(0); }
    100% { opacity: 0; transform: scaleX(var(--flip)) rotateY(-12deg) translateY(70px) rotate(18deg); }
  }
  .sprite-wrap.faint .sprite-shadow,
  .sprite-wrap.captured .sprite-shadow { animation: none; opacity: 0; transition: opacity 0.4s; }

  /* 잡힘 (enemy만) */
  .sprite-wrap.captured img { animation: captured-anim 1s forwards; }
  @keyframes captured-anim {
    0%   { opacity: 1; transform: scaleX(var(--flip)) rotateY(-12deg) scale(1);   filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)); }
    50%  { opacity: 1; transform: scaleX(var(--flip)) rotateY(-12deg) scale(0.4); filter: drop-shadow(0 0 24px var(--accent)) brightness(2.2); }
    100% { opacity: 0; transform: scaleX(var(--flip)) rotateY(-12deg) scale(0); }
  }

  /* 잡기도구 */
  .catch-ball {
    position: absolute;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(180deg, #ef4444 0%, #ef4444 48%, #fff 48%, #fff 52%, #f1f5f9 52%, #f1f5f9 100%);
    border: 3px solid #1e293b;
    box-shadow: 0 6px 12px rgba(0,0,0,0.5), inset 0 -8px 12px rgba(0,0,0,0.2);
    z-index: 5;
    transform: translate(-50%, -50%);
  }
  .catch-ball::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    background: white;
    border: 3px solid #1e293b;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .catch-ball.thrown {
    animation: ball-throw 0.5s ease-out forwards;
  }
  @keyframes ball-throw {
    0% { transform: translate(-50%, -50%) scale(0.6) rotate(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); opacity: 1; }
  }
  .catch-ball.shake {
    animation: ball-shake 0.5s ease-in-out;
  }
  @keyframes ball-shake {
    0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
    25% { transform: translate(-50%, -50%) rotate(-25deg); }
    75% { transform: translate(-50%, -50%) rotate(25deg); }
  }
  .catch-ball.success {
    animation: ball-success 0.6s ease-out forwards;
  }
  @keyframes ball-success {
    0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
    50% { transform: translate(-50%, -50%) scale(1.3); filter: brightness(1.8) drop-shadow(0 0 30px var(--accent)); }
    100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); opacity: 0; }
  }
  .catch-ball.broken {
    animation: ball-break 0.5s ease-out forwards;
  }
  @keyframes ball-break {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.4); filter: brightness(2); }
    100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  }

  /* 별 파티클 */
  .catch-sparkle {
    position: absolute;
    font-size: 28px;
    z-index: 6;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }
  .catch-sparkle.fly {
    animation: sparkle-fly 0.9s ease-out forwards;
  }
  @keyframes sparkle-fly {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% {
      transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.5) rotate(360deg);
      opacity: 0;
    }
  }

  /* GET 텍스트 */
  .catch-banner {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Jua', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 16px var(--accent), 0 0 32px var(--accent), 4px 4px 0 #1e293b;
    z-index: 7;
    pointer-events: none;
    white-space: nowrap;
  }
  .catch-banner.show {
    animation: banner-pop 1.4s ease-out forwards;
  }
  @keyframes banner-pop {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-12deg); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.3) rotate(0deg); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    85% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); opacity: 0; }
  }

  /* 화면 빛남 (성공) */
  .battle-field.catch-flash::before {
    background: radial-gradient(circle at center, rgba(255,211,78,0.6) 0%, transparent 70%);
    animation: catch-flash-anim 0.6s ease-out forwards;
  }
  @keyframes catch-flash-anim {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* 잡기 실패 X */
  .catch-fail-x {
    position: absolute;
    font-size: 64px;
    z-index: 7;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    color: #dc2626;
    text-shadow: 0 0 12px rgba(0,0,0,0.8), 4px 4px 0 #1e293b;
    font-weight: 900;
  }
  .catch-fail-x.show { animation: fail-pop 0.7s ease-out forwards; }
  @keyframes fail-pop {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.4) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
  }

  /* 배틀 필드 흔들림 (피격 시) */
  .battle-field.shake { animation: field-shake 0.3s; }
  @keyframes field-shake {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-4px, 2px); }
    40% { transform: translate(4px, -2px); }
    60% { transform: translate(-3px, -1px); }
    80% { transform: translate(3px, 2px); }
  }

  /* 화면 플래시 (히트 시) */
  .battle-flash {
    position: absolute;
    inset: 0;
    background: white;
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    mix-blend-mode: screen;
  }
  .battle-flash.flash-hit { animation: flash-hit 0.25s; }
  @keyframes flash-hit {
    0% { opacity: 0; }
    30% { opacity: 0.55; }
    100% { opacity: 0; }
  }

  /* ===== 스킬 발사체 ===== */
  .fx-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    overflow: visible;
  }
  .projectile {
    position: absolute;
    top: 50%;
    left: 0;
    width: 50px;
    height: 50px;
    transform: translate(-50%, -50%);
    will-change: transform, left, top, opacity;
  }
  .projectile.fire {
    background: radial-gradient(circle at 35% 35%, #fff3a0 0%, #ffb84d 30%, #ff5722 60%, transparent 75%);
    border-radius: 50%;
    filter: drop-shadow(0 0 12px #ff8a3d) blur(0.3px);
    animation: spin-fast 0.4s linear infinite;
  }
  .projectile.water {
    background: radial-gradient(ellipse at 35% 30%, #e3f2fd 0%, #64b5f6 30%, #1976d2 65%, transparent 80%);
    border-radius: 60% 40% 50% 50% / 50% 50% 60% 40%;
    filter: drop-shadow(0 0 10px #2196f3);
    animation: spin-slow 0.6s linear infinite;
  }
  .projectile.normal {
    width: 70px;
    height: 30px;
    background: linear-gradient(90deg, transparent 0%, #fff 30%, #fff 70%, transparent 100%);
    border-radius: 50%;
    filter: drop-shadow(0 0 8px #fff);
  }
  .projectile.grass {
    background: radial-gradient(ellipse at 35% 30%, #d4f5b3 0%, #7fc34a 35%, #3d8b1f 70%, transparent 85%);
    border-radius: 60% 30% 60% 30% / 50% 60% 40% 50%;
    filter: drop-shadow(0 0 10px #7fc34a);
    animation: spin-slow 0.6s linear infinite;
  }
  .projectile.spirit {
    background: radial-gradient(circle at 35% 35%, #ffffff 0%, #e1b3ff 25%, #9c27b0 55%, transparent 80%);
    border-radius: 50%;
    filter: drop-shadow(0 0 14px #d580ff) blur(0.4px);
    animation: spin-fast 0.3s linear infinite;
  }
  .projectile.electric {
    width: 60px;
    height: 60px;
    background: radial-gradient(circle at 50% 50%, #fff9c4 0%, #ffeb3b 30%, #fbbf24 60%, transparent 78%);
    border-radius: 50%;
    filter: drop-shadow(0 0 14px #fbbf24) drop-shadow(0 0 6px #fff);
    animation: spin-fast 0.25s linear infinite, electric-flicker 0.15s ease-in-out infinite;
  }
  @keyframes electric-flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .projectile.dark {
    width: 55px;
    height: 55px;
    background: radial-gradient(circle at 35% 35%, #6a4c93 0%, #4a148c 40%, #1a0033 70%, transparent 85%);
    border-radius: 50%;
    filter: drop-shadow(0 0 12px #4a148c) blur(0.5px);
    animation: spin-slow 0.7s linear infinite;
  }
  @keyframes spin-fast { to { transform: translate(-50%, -50%) rotate(360deg); } }
  @keyframes spin-slow { to { transform: translate(-50%, -50%) rotate(-360deg); } }

  /* 명중 폭발 */
  .impact {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
  }
  .impact.fire {
    width: 100px; height: 100px;
    background: radial-gradient(circle, #fff3a0 0%, #ff8a3d 30%, #ff3030 55%, transparent 70%);
    border-radius: 50%;
    animation: impact-pop 0.5s forwards;
    filter: drop-shadow(0 0 15px #ff5722);
  }
  .impact.water {
    width: 110px; height: 110px;
    background: radial-gradient(circle, #e3f2fd 0%, #64b5f6 35%, #1565c0 60%, transparent 75%);
    border-radius: 50%;
    animation: impact-pop 0.5s forwards;
    filter: drop-shadow(0 0 15px #2196f3);
  }
  .impact.normal {
    width: 90px; height: 90px;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.4) 40%, transparent 65%);
    border-radius: 50%;
    animation: impact-pop 0.4s forwards;
  }
  .impact.grass {
    width: 110px; height: 110px;
    background: radial-gradient(circle, #d4f5b3 0%, #7fc34a 35%, #3d8b1f 60%, transparent 75%);
    border-radius: 50%;
    animation: impact-pop 0.5s forwards;
    filter: drop-shadow(0 0 15px #7fc34a);
  }
  .impact.spirit {
    width: 120px; height: 120px;
    background: radial-gradient(circle, #ffffff 0%, #e1b3ff 30%, #9c27b0 55%, transparent 75%);
    border-radius: 50%;
    animation: impact-pop 0.55s forwards;
    filter: drop-shadow(0 0 20px #d580ff);
  }
  .impact.electric {
    width: 110px; height: 110px;
    background: radial-gradient(circle, #fff9c4 0%, #ffeb3b 30%, #fbbf24 55%, transparent 75%);
    border-radius: 50%;
    animation: impact-pop 0.5s forwards;
    filter: drop-shadow(0 0 18px #fbbf24);
  }
  .impact.dark {
    width: 115px; height: 115px;
    background: radial-gradient(circle, #6a4c93 0%, #4a148c 40%, #1a0033 65%, transparent 80%);
    border-radius: 50%;
    animation: impact-pop 0.6s forwards;
    filter: drop-shadow(0 0 20px #4a148c);
  }
  @keyframes impact-pop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    35%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.6); }
  }

  /* 슬래시 (노말 기술 전용 추가) */
  .slash {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 100px;
    height: 8px;
    background: linear-gradient(90deg, transparent 0%, #fff 50%, transparent 100%);
    border-radius: 4px;
    filter: drop-shadow(0 0 6px #fff);
    pointer-events: none;
    z-index: 5;
    animation: slash-anim 0.4s forwards;
  }
  @keyframes slash-anim {
    0% { opacity: 0; transform: translate(-50%, -50%) rotate(-45deg) scaleX(0); }
    30% { opacity: 1; transform: translate(-50%, -50%) rotate(-45deg) scaleX(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) rotate(-45deg) scaleX(1.2); }
  }

  .info-card {
    flex: 1;
    background: rgba(255, 255, 255, 0.94);
    color: #1a1a1a;
    border-radius: 10px;
    padding: 8px 12px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.2);
  }
  .info-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .info-card-name { font-family: 'Black Han Sans', sans-serif; font-size: 16px; color: #1a1a1a; }
  .info-card-lv { font-family: 'Jua', sans-serif; font-size: 12px; color: #555; }
  .hp-bar-wrap { background: #2a2a2a; border-radius: 99px; height: 9px; overflow: hidden; }
  .hp-bar { height: 100%; background: var(--hp-high); border-radius: 99px; transition: width 0.5s ease-out, background 0.3s; }
  .hp-bar.mid { background: var(--hp-mid); }
  .hp-bar.low { background: var(--hp-low); }
  .hp-text { font-family: 'Jua', sans-serif; font-size: 11px; color: #444; text-align: right; margin-top: 2px; }
  .exp-bar-wrap { background: #2a2a2a; border-radius: 99px; height: 4px; overflow: hidden; margin-top: 3px; }
  .exp-bar { height: 100%; background: var(--exp-bar); transition: width 0.5s ease-out; }
  /* 상태이상 표시 */
  .status-row { margin-top: 4px; min-height: 16px; }
  .passive-pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: #1a1a1a;
    background: linear-gradient(135deg, #ffd34e, #ff8a3d);
    padding: 2px 7px;
    border-radius: 99px;
    font-family: 'Jua', sans-serif;
    margin-right: 4px;
  }
  .status-pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: white;
    padding: 2px 8px;
    border-radius: 99px;
    font-family: 'Jua', sans-serif;
  }
  /* 기술 버튼의 상태이상 표시 */
  .move-status {
    font-size: 11px;
    color: var(--accent);
    font-family: 'Jua', sans-serif;
    margin-top: 2px;
  }
  /* sprite의 상태이상 시각 효과 */
  .sprite-wrap.status-burn img { animation: idle-bob 2.4s ease-in-out infinite, burn-tint 1.2s ease-in-out infinite; }
  .sprite-wrap.status-paralyze img { animation: idle-bob 2.4s ease-in-out infinite, para-tint 0.8s ease-in-out infinite; }
  .sprite-wrap.status-poison img { animation: idle-bob 2.4s ease-in-out infinite, poison-tint 1.5s ease-in-out infinite; }
  .sprite-wrap.status-sleep img { animation: idle-bob 4s ease-in-out infinite; opacity: 0.7; }
  .sprite-wrap.status-fear img { animation: idle-bob 2.4s ease-in-out infinite, fear-shake 0.4s ease-in-out infinite; }
  @keyframes fear-shake {
    0%, 100% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)); }
    25% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)) drop-shadow(0 0 8px #3d1f5e) brightness(0.85); }
    50% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)); }
    75% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)) drop-shadow(0 0 8px #3d1f5e) brightness(0.85); }
  }
  @keyframes burn-tint {
    0%, 100% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)); }
    50% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)) drop-shadow(0 0 8px #ff5722) sepia(0.3) saturate(1.5); }
  }
  @keyframes para-tint {
    0%, 100% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)); }
    50% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)) drop-shadow(0 0 8px #fbbf24) brightness(1.3); }
  }
  @keyframes poison-tint {
    0%, 100% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)); }
    50% { filter: drop-shadow(0 6px 4px rgba(0,0,0,0.35)) drop-shadow(0 0 10px #9c27b0) hue-rotate(-20deg); }
  }
  /* 잠 zZ 표시 */
  .sprite-wrap.status-sleep::after {
    content: '💤';
    position: absolute;
    top: 5px;
    right: 5px;
    font-size: 24px;
    z-index: 3;
    animation: zz-bob 1.5s ease-in-out infinite;
  }
  @keyframes zz-bob {
    0%, 100% { transform: translateY(0); opacity: 0.8; }
    50% { transform: translateY(-6px); opacity: 1; }
  }
  .type-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 8px;
    border-radius: 99px;
    color: white;
    font-weight: 700;
    margin-left: 6px;
    vertical-align: middle;
  }

  .message-box {
    margin-top: 10px;
    background: var(--bg-card);
    border: 2px solid var(--bg-card-light);
    border-radius: 12px;
    padding: 12px 14px;
    min-height: 56px;
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    position: relative;
  }
  .message-box::after {
    content: '▼';
    position: absolute;
    bottom: 8px;
    right: 14px;
    font-size: 10px;
    color: var(--accent);
    animation: bob 1s infinite;
    opacity: 0;
  }
  .message-box.tap::after { opacity: 1; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(3px); }
  }

  /* 메인 액션 메뉴 */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .action-grid.hidden { display: none; }
  .action-btn {
    background: var(--bg-card);
    border: 2px solid var(--bg-card-light);
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    text-align: center;
    color: var(--text);
    box-shadow: 0 3px 0 rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
    font-family: 'Jua', sans-serif;
    font-size: 16px;
  }
  .action-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .action-btn.cooldown {
    opacity: 0.55;
    filter: grayscale(0.3);
  }
  .action-btn.cooldown .badge {
    background: #888 !important;
    color: #fff !important;
  }
  .action-btn .icon { font-size: 20px; margin-right: 4px; }
  .action-btn .badge {
    display: inline-block;
    background: var(--accent);
    color: #1a1a1a;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 99px;
    margin-left: 4px;
    font-weight: 700;
  }

  /* 기술 메뉴 */
  .moves-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .moves-grid.hidden { display: none; }
  .move-btn {
    background: var(--bg-card);
    border: 2px solid var(--bg-card-light);
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    box-shadow: 0 3px 0 rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .move-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .move-btn-name { font-family: 'Jua', sans-serif; font-size: 15px; }
  .move-btn-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 11px; color: var(--text-dim); }
  .back-btn {
    margin-top: 8px;
    background: var(--bg-card-light);
    border: none;
    border-radius: 8px;
    padding: 8px;
    color: var(--text-dim);
    font-family: 'Jua', sans-serif;
    cursor: pointer;
    width: 100%;
  }

  /* 데미지 팝업 */
  .damage-pop {
    position: absolute;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    color: #ff3030;
    text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
    pointer-events: none;
    animation: damage-rise 1s forwards;
    z-index: 10;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
  }
  .damage-pop.crit { color: #ffea00; font-size: 36px; }
  .damage-pop.weak { color: #aaaaaa; font-size: 22px; }
  .damage-pop.heal { color: #4ade80; }
  @keyframes damage-rise {
    0% { transform: translate(-50%, 0); opacity: 1; }
    20% { transform: translate(-50%, -25px) scale(1.15); }
    100% { transform: translate(-50%, -50px); opacity: 0; }
  }

  /* 모달 */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-mid);
    border: 2px solid var(--bg-card-light);
    border-radius: 18px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 12px;
    text-align: center;
  }
  .modal-close {
    margin-top: 14px;
    width: 100%;
    background: var(--bg-card-light);
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    cursor: pointer;
  }

  /* 파티 모달 - 교체 선택 */
  .party-list { display: flex; flex-direction: column; gap: 10px; }
  .party-item {
    background: var(--bg-card);
    border: 2px solid transparent;

    display: flex;
    align-items: center;
    gap: 12px;
  }
  .party-item:not(.disabled):active { transform: scale(0.98); }

  .party-item.disabled { opacity: 0.4; cursor: not-allowed; }
  .party-item img {
    width: 56px;
    height: 56px;
    object-fit: contain;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
  }
  .party-item-info { flex: 1; }
  .party-item-name { font-family: 'Jua', sans-serif; font-size: 16px; }
  .party-item-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .party-item-hp { background: #2a2a2a; border-radius: 99px; height: 6px; margin-top: 6px; overflow: hidden; }
  .party-item-hp-fill { height: 100%; background: var(--hp-high); transition: width 0.3s; }

  /* 상점/인벤토리 모달 */
  .shop-grid { display: flex; flex-direction: column; gap: 10px; }
  .shop-row {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .shop-icon { font-size: 32px; }
  .shop-info { flex: 1; }
  .shop-name { font-family: 'Jua', sans-serif; font-size: 15px; }
  .shop-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; line-height: 1.4; }
  .shop-buy {
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));

    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Jua', sans-serif;

  .shop-buy:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

  .shop-tab-row {
    display: flex;
    gap: 6px;

  .shop-tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Jua', sans-serif;
    border-radius: 8px;

    font-size: 14px;
  }
  .shop-tab.active { background: var(--bg-card-light); color: var(--text); }

  .inventory-summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 14px;
    background: var(--bg-card);
    padding: 8px;
    border-radius: 10px;
  }
  .inv-pill {
    text-align: center;
    padding: 6px;
    background: var(--bg-mid);
    border-radius: 8px;
    font-family: 'Jua', sans-serif;
  }
  .inv-pill-icon { font-size: 20px; }
  .inv-pill-count { font-family: 'Black Han Sans', sans-serif; color: var(--accent); font-size: 16px; }
  .inv-pill-label { font-size: 10px; color: var(--text-dim); }

  /* ===== 게임오버 ===== */
  .gameover-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 30px 20px;
    text-align: center;
  }
  .gameover-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 60px;
    color: var(--hp-low);
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: 3px;
    filter: drop-shadow(0 4px 12px rgba(239, 68, 68, 0.4));
  }
  .gameover-sub { font-family: 'Jua', sans-serif; color: var(--text-dim); margin-bottom: 30px; }
  .result-box {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 320px;
    margin-bottom: 24px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--bg-card-light);

  .result-row:last-child { border-bottom: none; }
  .result-label { font-family: 'Jua', sans-serif; color: var(--text-dim); }
  .result-value { font-family: 'Black Han Sans', sans-serif; color: var(--accent); font-size: 18px; }

  /* 타입 색상 */

  .type-water { background: var(--type-water); }
  .type-grass { background: var(--type-grass); }
  .type-electric { background: var(--type-electric); color: #1a1a1a; }
  .type-dark { background: var(--type-dark); }
  .type-spirit { background: var(--type-spirit); }
  .type-normal { background: var(--type-normal); }

    text-align: center;
    padding: 20px 0;

  .capture-card img {
    width: 140px;

  }
  @keyframes capture-glow {

  .capture-name { font-family: 'Black Han Sans', sans-serif; font-size: 24px; color: var(--accent); }
  .capture-msg { font-family: 'Jua', sans-serif; color: var(--text); margin-top: 6px; font-size: 14px; }

    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-light) 100%);
    border: 2px solid rgba(96, 165, 250, 0.5);

    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;

    gap: 10px;

    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 0 8px;
  }
  .lobby-btn {
    width: 100%;
    padding: 22px;
    font-size: 20px;
    font-family: 'Jua', sans-serif;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;

  .lobby-btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-hot));
    color: #1a1a1a;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(255, 211, 78, 0.3);
  }
  .lobby-btn-secondary {
    background: var(--bg-card-light);
    color: var(--text);
    border: 2px solid rgba(255, 255, 255, 0.1);
  }
  .lobby-btn-icon { font-size: 24px; }

  /* ===== 도감 화면 ===== */
  .back-btn {
    background: var(--bg-card);
    color: var(--text);
    border: none;
    padding: 10px 18px;

// ===== localStorage 저장/로드 =====
function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      state.ownedMons = [...STARTER_MON_IDS];
      state.metaGems = 0;
      state.candies = {};
      saveProgress();
      return;
    }
    const data = JSON.parse(raw);
    state.ownedMons = (Array.isArray(data.ownedMons) && data.ownedMons.length)
      ? data.ownedMons.filter(id => MONSTERS[id])  // 존재하지 않는 ID 제거(안전)
      : [...STARTER_MON_IDS];
    state.metaGems = (typeof data.metaGems === "number") ? data.metaGems : 0;
    state.candies = (data.candies && typeof data.candies === "object") ? data.candies : {};
  } catch(e) {
    console.error("진행도 로드 실패:", e);
    state.ownedMons = [...STARTER_MON_IDS];
    state.metaGems = 0;
    state.candies = {};
  }
}

function saveProgress() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      ownedMons: state.ownedMons,
      metaGems: state.metaGems,
      candies: state.candies,
      savedAt: Date.now()
    }));
  } catch(e) {
    console.error("진행도 저장 실패:", e);
  }
}

function $(id) { return document.getElementById(id); }
function rand(min, max) { return Math.random() * (max - min) + min; }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}
function getActive() { return state.party[state.activeIdx]; }

// 몬스터 인스턴스 생성 (레벨 기반 스탯)
function makeInstance(monId, level) {
  const base = MONSTERS[monId];
  const factor = 1 + (level - 1) * 0.05;
  return {
    id: base.id,
    name: base.name,
    type: base.type,
    rarity: base.rarity || "common",
    passive: base.passive || null,
    facing: base.facing,
    maxHp: Math.floor(base.stats.hp * factor),
    currentHp: Math.floor(base.stats.hp * factor),
    atk: Math.floor(base.stats.atk * factor),
    def: Math.floor(base.stats.def * factor),
    spd: Math.floor(base.stats.spd * factor),
    moves: [...base.moves],
    level: level,
    exp: 0,
    expToNext: 80 * level,
    status: null,
    sleepTurns: 0,
    // 패시브 추적
    phoenixUsedWave: -10,  // 마지막 부활 웨이브 (-10 = 아직 안 씀)
    starGraceBoost: false  // 별정령 교체 후 첫 공격 부스트 플래그
  };
}

// 적 인스턴스 (웨이브 기반 스케일)
function makeEnemy(monId, wave) {
  const inst = makeInstance(monId, wave);
  return inst;
}

function calcDamage(attacker, defender, moveKey) {
  const move = MOVES[moveKey];
  if (move.power === 0) {
    return { damage: 0, typeMult: 1, isCrit: false, move };
  }
  const typeMult = TYPE_CHART[move.type]?.[defender.type] ?? 1.0;
  const stab = (move.type === attacker.type) ? 1.5 : 1.0;
  const randMult = rand(0.85, 1.0);

  // 크리 확률 (별정령 패시브: 2배)
  let critChance = 0.0625;
  if (attacker.passive === "stars_grace") critChance *= 2;
  const crit = (Math.random() < critChance) ? 1.5 : 1.0;

  // 화상 시 공격력 50% 다운
  const burnMod = (attacker.status === "burn") ? 0.5 : 1.0;
  // 공포 시 받는 데미지 +20%
  const fearMod = (defender.status === "fear") ? 1.2 : 1.0;
  // 흑룡 데미지 감소 10%
  const darkReignMod = (defender.passive === "dark_reign") ? 0.9 : 1.0;
  // 별정령 교체 첫 공격 +20%
  let starBoostMod = 1.0;
  if (attacker.passive === "stars_grace" && attacker.starGraceBoost) {
    starBoostMod = 1.2;
    attacker.starGraceBoost = false;  // 1회용
  }

  const effectiveAtk = attacker.atk * burnMod * starBoostMod;
  const base = (move.power * effectiveAtk / defender.def) * 0.4;
  const damage = Math.floor(base * typeMult * stab * randMult * crit * fearMod * darkReignMod);
  return { damage: Math.max(1, damage), typeMult, isCrit: crit > 1, move };
}

// 스피드 계산 (마비 50% 디버프 반영)
function effectiveSpd(mon) {
  return (mon.status === "paralyze") ? mon.spd * 0.5 : mon.spd;
}

function renderStartScreen() {
  const grid = $("monster-grid");
  grid.innerHTML = "";
  // ownedMons 기반으로만 렌더링 (영구 보유 중인 몬스터만 시작 가능)
  state.ownedMons.forEach(id => {
    const mon = MONSTERS[id];
    if (!mon) return;
    const card = document.createElement("div");
    card.className = `mon-card rarity-${mon.rarity || 'common'}`;
    card.dataset.id = id;
    let rarityBadge = "";
    if (mon.rarity === "legendary") rarityBadge = `<div class="rarity-badge legend">★ 전설</div>`;
    else if (mon.rarity === "rare") rarityBadge = `<div class="rarity-badge rare">◆ 레어</div>`;
    card.innerHTML = `
      ${rarityBadge}
      <img src="${IMAGES[id]}" alt="${mon.name}">
      <div class="mon-card-info">
        <div class="mon-card-name">${mon.name}</div>
        <div class="mon-card-type type-${mon.type}">${TYPES[mon.type].name}</div>
      </div>
    `;
    card.onclick = () => selectMonster(id);
    grid.appendChild(card);
  });
}

function selectMonster(id) {
  state.selectedMonId = id;
  document.querySelectorAll(".mon-card").forEach(c => c.classList.toggle("selected", c.dataset.id === id));
  const mon = MONSTERS[id];
  $("preview-detail").classList.add("show");
  $("preview-name").textContent = mon.name;
  $("preview-type").innerHTML = `<span class="type-badge type-${mon.type}">${TYPES[mon.type].name}</span>`;
  const s = mon.stats;
  $("preview-stats").innerHTML = `
    <div class="stat-pill"><div class="stat-pill-label">HP</div><div class="stat-pill-value">${s.hp}</div></div>
    <div class="stat-pill"><div class="stat-pill-label">공격</div><div class="stat-pill-value">${s.atk}</div></div>
    <div class="stat-pill"><div class="stat-pill-label">방어</div><div class="stat-pill-value">${s.def}</div></div>
    <div class="stat-pill"><div class="stat-pill-label">스피드</div><div class="stat-pill-value">${s.spd}</div></div>
  `;
  const btn = $("start-btn");
  btn.disabled = false;
  btn.textContent = `${mon.name}와 함께 시작`;
}

  renderParty();
  updateTopbar();
  spawnNextEnemy();
}

function spawnNextEnemy() {
  $("enemy-sprite").classList.remove("faint", "hit", "captured", "attacking");
  $("player-sprite").classList.remove("faint", "hit", "captured", "attacking");
  $("fx-layer").innerHTML = "";

  // 활성 몬스터 검증 (배열 길이 변경 가능성)
  if (state.activeIdx >= state.party.length) {
    state.activeIdx = 0;
  }
  if (state.party.length === 0) { endGame(); return; }

  const commonIds = ALL_MON_IDS.filter(id => MONSTERS[id].rarity !== "legendary");
  const legendaryIds = ALL_MON_IDS.filter(id => MONSTERS[id].rarity === "legendary");

  // 10웨이브마다 보스 출현
  const isBoss = state.wave > 0 && state.wave % 10 === 0;
  let isWildLegendary = false;
  let enemyId;

  if (isBoss && legendaryIds.length > 0) {
    enemyId = pickRandom(legendaryIds);
  } else if (state.wave >= 10 && Math.random() < 0.03 && legendaryIds.length > 0) {
    enemyId = pickRandom(legendaryIds);
    isWildLegendary = true;
  } else {
    enemyId = pickRandom(commonIds);
  }

  state.enemy = makeEnemy(enemyId, state.wave);
  state.isBossWave = isBoss;

  if (isBoss) {
    // 보스 부스트: HP +100%, 공격 +20%
    state.enemy.maxHp = Math.floor(state.enemy.maxHp * 2.0);
    state.enemy.currentHp = state.enemy.maxHp;
    state.enemy.atk = Math.floor(state.enemy.atk * 1.2);
  } else if (isWildLegendary) {
    // 야생 전설 살짝 부스트
    state.enemy.maxHp = Math.floor(state.enemy.maxHp * 1.1);
    state.enemy.currentHp = state.enemy.maxHp;
    state.enemy.atk = Math.floor(state.enemy.atk * 1.1);
  }

  // 새 웨이브 시작 시 교체 쿨다운 리셋
  state.swapCooldown = 0;

  // 웨이브 시작 시 활성 몬스터 회복 (30%)
  if (state.wave > 1) {
    const p = getActive();
    const heal = Math.floor(p.maxHp * 0.3);
    p.currentHp = Math.min(p.maxHp, p.currentHp + heal);
  }

  // 보스 배경 효과 토글
  $("battle-field").classList.toggle("boss-mode", isBoss);

  renderEnemy();
  renderPlayer();
  renderParty();
  updateTopbar();
  hideAllMenus();

  if (isBoss) {
    queueMessage(`⚔️ BOSS BATTLE ⚔️`);
    queueMessage(`보스 ${state.enemy.name}이(가) 강림했다!`);
  } else if (isWildLegendary) {
    queueMessage(`✨ 야생의 전설 ${state.enemy.name}이(가) 나타났다! ✨`);
  } else {
    queueMessage(`야생의 ${state.enemy.name}(이)가 나타났다!`);
  }
  queueAction(() => {
    showActionMenu();
    state.battleLocked = false;
  });
  startMessages();
}

function renderEnemy() {
  $("enemy-img").src = `${IMAGES[state.enemy.id]}`;
  $("enemy-name").textContent = state.enemy.name;
  $("enemy-type").textContent = TYPES[state.enemy.type].name;
  $("enemy-type").className = `type-badge type-${state.enemy.type}`;
  $("enemy-lv").textContent = `Lv ${state.enemy.level}`;
  $("enemy-sprite").classList.toggle("flipped", state.enemy.facing === "right");
  // 상태이상 sprite 클래스
  ["burn","paralyze","sleep","poison","fear"].forEach(s => $("enemy-sprite").classList.remove(`status-${s}`));
  if (state.enemy.status) $("enemy-sprite").classList.add(`status-${state.enemy.status}`);
  renderMonStatus("enemy", state.enemy);
  updateHpBar("enemy", state.enemy);
}

function renderPlayer() {
  const p = getActive();
  $("player-img").src = `${IMAGES[p.id]}`;
  $("player-name").textContent = p.name;
  $("player-type").textContent = TYPES[p.type].name;
  $("player-type").className = `type-badge type-${p.type}`;
  $("player-lv").textContent = `Lv ${p.level}`;
  $("player-sprite").classList.toggle("flipped", p.facing === "left");
  // 상태이상 sprite 클래스
  ["burn","paralyze","sleep","poison","fear"].forEach(s => $("player-sprite").classList.remove(`status-${s}`));
  if (p.status) $("player-sprite").classList.add(`status-${p.status}`);
  renderMonStatus("player", p);
  updateHpBar("player", p);
  $("player-hp-text").textContent = `${p.currentHp} / ${p.maxHp}`;
  $("player-exp-bar").style.width = `${(p.exp / p.expToNext) * 100}%`;
}

function updateHpBar(who, mon) {
  const bar = $(`${who}-hp-bar`);
  const pct = (mon.currentHp / mon.maxHp) * 100;
  bar.style.width = `${pct}%`;
  bar.classList.remove("mid", "low");
  if (pct < 25) bar.classList.add("low");
  else if (pct < 50) bar.classList.add("mid");
}

function renderParty() {
  const display = $("party-display");
  display.innerHTML = "";
  for (let i = 0; i < PARTY_MAX; i++) {
    const mon = state.party[i];
    const slot = document.createElement("div");
    slot.className = "party-slot";
    if (!mon) {
      slot.classList.add("empty");
    } else {
      if (i === state.activeIdx) slot.classList.add("active");
      if (mon.currentHp <= 0) slot.classList.add("fainted");
      const hpPct = (mon.currentHp / mon.maxHp) * 100;
      let hpCls = "";
      if (hpPct < 25) hpCls = "low";
      else if (hpPct < 50) hpCls = "mid";
      slot.innerHTML = `
        <img src="${IMAGES[mon.id]}" alt="${mon.name}">
        <div class="party-slot-hp"><div class="party-slot-hp-fill ${hpCls}" style="width:${hpPct}%"></div></div>
      `;
    }
    display.appendChild(slot);
  }
}

function updateTopbar() {
  $("wave-display").textContent = state.wave;
  $("coin-display").textContent = state.inventory.coins;
  $("gem-display").textContent = state.inventory.gems;
  $("score-display").textContent = state.score;
  $("balls-badge").textContent = state.inventory.balls;
}

// ===== 메뉴 표시 =====
function hideAllMenus() {
  $("action-grid").classList.add("hidden");
  $("moves-grid").classList.add("hidden");
  $("moves-back").classList.add("hidden");
}

function showActionMenu() {
  hideAllMenus();
  $("action-grid").classList.remove("hidden");
  updateTopbar();

  // 교체 쿨다운 표시 업데이트
  const swapBtn = $("swap-btn");
  const swapBadge = $("swap-cooldown-badge");
  if (state.swapCooldown > 0) {
    swapBadge.textContent = state.swapCooldown;
    swapBadge.style.display = "";
    swapBtn.classList.add("cooldown");
  } else {
    swapBadge.style.display = "none";
    swapBtn.classList.remove("cooldown");
  }
}

function showMoves() {
  if (state.battleLocked) return;
  hideAllMenus();
  const grid = $("moves-grid");
  grid.innerHTML = "";
  getActive().moves.forEach(moveKey => {
    const move = MOVES[moveKey];
    const btn = document.createElement("button");
    btn.className = "move-btn";
    let statusLabel = "";
    if (move.status) {
      const s = STATUS_INFO[move.status.type];
      const pct = Math.round(move.status.chance * 100);
      statusLabel = `<div class="move-status">${s.icon} ${s.name} ${pct}%</div>`;
    }
    btn.innerHTML = `
      <div class="move-btn-name">${move.name}</div>
      ${statusLabel}
      <div class="move-btn-meta">
        <span class="type-badge type-${move.type}">${TYPES[move.type].name}</span>
        <span>위력 ${move.power}</span>
      </div>
    `;
    btn.onclick = () => playerAttack(moveKey);
    grid.appendChild(btn);
  });
  grid.classList.remove("hidden");
  $("moves-back").classList.remove("hidden");
}

// ===== 배틀 진행 =====
async function playerAttack(moveKey) {
  if (state.battleLocked) return;
  state.battleLocked = true;
  hideAllMenus();

  const player = getActive();
  const playerFirst = effectiveSpd(player) >= effectiveSpd(state.enemy);

  // 행동 시도 (상태이상으로 못할 수도)
  async function tryAttack(attacker, defender, attackerSide, defenderSide, mKey) {
    // 잠 처리
    if (attacker.status === "sleep") {
      if (attacker.sleepTurns > 0) {
        const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
        await showMessage(`${label}은(는) 잠들어 있다! (${attacker.sleepTurns}턴 남음)`, 700);
        attacker.sleepTurns -= 1;
        if (attacker.sleepTurns <= 0) {
          attacker.status = null;
          renderMonStatus(attackerSide, attacker);
          await showMessage(`${label}은(는) 잠에서 깨어났다!`, 700);
        }
        return "blocked";
      }
    }
    // 마비 25% 행동 불가
    if (attacker.status === "paralyze" && Math.random() < 0.25) {
      const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
      await showMessage(`${label}은(는) 마비되어 움직일 수 없다!`, 700);
      return "blocked";
    }
    // 공포 50% 행동 불가
    if (attacker.status === "fear" && Math.random() < 0.50) {
      const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
      await showMessage(`😱 ${label}은(는) 공포에 떨어 움직일 수 없다!`, 700);
      return "blocked";
    }
    await executeAttack(attacker, defender, attackerSide, defenderSide, mKey);
    return "ok";
  }

  if (playerFirst) {
    await tryAttack(player, state.enemy, "player", "enemy", moveKey);
    if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }
    await tryAttack(state.enemy, player, "enemy", "player", pickRandom(state.enemy.moves));
    if (player.currentHp <= 0) { await handlePlayerFaint(); return; }
  } else {
    await tryAttack(state.enemy, player, "enemy", "player", pickRandom(state.enemy.moves));
    if (player.currentHp <= 0) { await handlePlayerFaint(); return; }
    await tryAttack(player, state.enemy, "player", "enemy", moveKey);
    if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }
  }

  // 턴 끝: 화상/독 데미지 (양쪽 다 체크)
  await applyEndTurnStatus(player, "player");
  if (player.currentHp <= 0) { await handlePlayerFaint(); return; }
  await applyEndTurnStatus(state.enemy, "enemy");
  if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }

  // 턴 끝: 패시브 효과
  await applyEndTurnPassives(player, "player");
  if (player.currentHp <= 0) { await handlePlayerFaint(); return; }
  if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }
  await applyEndTurnPassives(state.enemy, "enemy");
  if (player.currentHp <= 0) { await handlePlayerFaint(); return; }
  if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }

  // 교체 쿨다운 감소
  if (state.swapCooldown > 0) state.swapCooldown -= 1;

  state.battleLocked = false;
  showActionMenu();
}

// 턴 끝 패시브 효과
async function applyEndTurnPassives(mon, side) {
  if (!mon || mon.currentHp <= 0) return;

  // 청룡: 매턴 HP 회복 (일반 12% / 보스 6%)
  if (mon.passive === "azure_blessing" && mon.currentHp < mon.maxHp) {
    const isBossEnemy = (side === "enemy" && state.isBossWave);
    const healPct = isBossEnemy ? 0.06 : 0.12;
    const heal = Math.floor(mon.maxHp * healPct);
    const before = mon.currentHp;
    mon.currentHp = Math.min(mon.maxHp, mon.currentHp + heal);
    const actual = mon.currentHp - before;
    if (actual > 0) {
      popHeal(side, actual);
      updateHpBar(side, mon);
      if (side === "player") {
        $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
        renderParty();
      }
      await showMessage(`💧 ${mon.name}의 수룡의 가호! HP 회복`, 500);
    }
  }

  // 별정령: 매턴 적 최대HP 데미지 (일반 5% / 보스 3%)
  if (mon.passive === "stars_grace") {
    const target = (side === "player") ? state.enemy : getActive();
    const targetSide = (side === "player") ? "enemy" : "player";
    if (target && target.currentHp > 0) {
      const isBossEnemy = (side === "enemy" && state.isBossWave);
      const dmgPct = isBossEnemy ? 0.03 : 0.05;
      const dmg = Math.max(1, Math.floor(target.maxHp * dmgPct));
      target.currentHp = Math.max(0, target.currentHp - dmg);
      popDamage(targetSide, dmg, false, 1, `-${dmg}`);
      updateHpBar(targetSide, target);
      if (targetSide === "player") {
        $("player-hp-text").textContent = `${target.currentHp} / ${target.maxHp}`;
        renderParty();
      }
      await showMessage(`⭐ ${mon.name}의 별의 가호 자동공격!`, 500);
    }
  }

  // 꽃늑대: 후방 팀원 매턴 10% 회복 (플레이어 측에서만)
  if (mon.passive === "natures_blessing" && side === "player") {
    let healedAny = false;
    state.party.forEach((m, i) => {
      if (i === state.activeIdx) return;  // 활성 멤버 제외
      if (!m || m.currentHp <= 0 || m.currentHp >= m.maxHp) return;
      const heal = Math.floor(m.maxHp * 0.10);
      m.currentHp = Math.min(m.maxHp, m.currentHp + heal);
      healedAny = true;
    });
    if (healedAny) {
      renderParty();
      await showMessage(`🌿 ${mon.name}의 자연의 축복! 후방 팀원 회복`, 500);
    }
  }
}

// 턴 종료 시 화상/독 데미지
async function applyEndTurnStatus(mon, side) {
  if (mon.status === "burn") {
    const dmg = Math.max(1, Math.floor(mon.maxHp / 16));
    mon.currentHp = Math.max(0, mon.currentHp - dmg);
    const label = (side === "player") ? mon.name : `야생의 ${mon.name}`;
    await showMessage(`🔥 ${label}은(는) 화상 데미지!`, 600);
    popDamage(side, dmg, false, 1, `-${dmg}`);
    updateHpBar(side, mon);
    if (side === "player") {
      $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
      renderParty();
    }
    await sleep(400);
  } else if (mon.status === "poison") {
    const dmg = Math.max(1, Math.floor(mon.maxHp / 8));
    mon.currentHp = Math.max(0, mon.currentHp - dmg);
    const label = (side === "player") ? mon.name : `야생의 ${mon.name}`;
    await showMessage(`☠️ ${label}은(는) 독 데미지!`, 600);
    popDamage(side, dmg, false, 1, `-${dmg}`);
    updateHpBar(side, mon);
    if (side === "player") {
      $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
      renderParty();
    }
    await sleep(400);
  }
}

async function executeAttack(attacker, defender, attackerSide, defenderSide, moveKey) {
  const r = calcDamage(attacker, defender, moveKey);
  const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
  await showMessage(`${label}의 ${r.move.name}!`, 500);

  const attSprite = $(`${attackerSide}-sprite`);
  const defSprite = $(`${defenderSide}-sprite`);

  attSprite.classList.add("attacking");
  await sleep(150);

  await playSkillEffect(r.move.type, attackerSide, defenderSide);

  attSprite.classList.remove("attacking");

  // 데미지 처리 (위력 0 기술은 데미지 없음)
  if (r.damage > 0) {
    $("battle-flash").classList.remove("flash-hit");
    void $("battle-flash").offsetWidth;
    $("battle-flash").classList.add("flash-hit");

    $("battle-field").classList.remove("shake");
    void $("battle-field").offsetWidth;
    $("battle-field").classList.add("shake");

    defSprite.classList.add("hit");
    popDamage(defenderSide, r.damage, r.isCrit, r.typeMult);

    defender.currentHp = Math.max(0, defender.currentHp - r.damage);
    updateHpBar(defenderSide, defender);
    if (defenderSide === "player") {
      $("player-hp-text").textContent = `${defender.currentHp} / ${defender.maxHp}`;
      renderParty();
    }

    await sleep(450);
    defSprite.classList.remove("hit");
    $("battle-field").classList.remove("shake");
    $("battle-flash").classList.remove("flash-hit");
  } else {
    // 위력 0 기술 (수면포자 등) — 짧은 효과만
    await sleep(300);
  }

  if (r.isCrit) await showMessage("급소에 맞았다!", 500);
  if (r.typeMult > 1) await showMessage("효과가 굉장했다!", 500);
  else if (r.typeMult > 0 && r.typeMult < 1) await showMessage("효과가 별로인 듯하다...", 500);

  // 꽃늑대 패시브: 모든 상태이상 면역
  const defenderImmune = defender.passive === "natures_blessing";

  // 일반 기술의 상태이상 적용
  if (r.move.status && defender.currentHp > 0 && !defender.status && !defenderImmune) {
    if (Math.random() < r.move.status.chance) {
      await applyStatus(defender, defenderSide, r.move.status.type);
    }
  }

  // 흑룡 패시브: 공격받을 때 공포 부여 (일반 30% / 보스 15%)
  if (defender.passive === "dark_reign" && r.damage > 0 && attacker.currentHp > 0
      && !attacker.status && attacker.passive !== "natures_blessing") {
    const isBossDefender = (defenderSide === "enemy" && state.isBossWave);
    const fearChance = isBossDefender ? 0.15 : 0.30;
    if (Math.random() < fearChance) {
      await applyStatus(attacker, attackerSide, "fear");
    }
  }
}

// 상태이상 적용
async function applyStatus(mon, side, statusType) {
  mon.status = statusType;
  if (statusType === "sleep") {
    mon.sleepTurns = 1 + Math.floor(Math.random() * 3);  // 1~3턴
  }
  const info = STATUS_INFO[statusType];
  const label = (side === "player") ? mon.name : `야생의 ${mon.name}`;
  await showMessage(`${info.icon} ${label}은(는) ${info.name} 상태가 되었다!`, 800);
  renderMonStatus(side, mon);
  if (side === "player") renderParty();
}

// 상태이상 아이콘 + 패시브 표시
function renderMonStatus(side, mon) {
  const wrap = $(`${side}-status`);
  if (!wrap) return;
  let html = "";
  // 패시브 (전설 표시)
  if (mon.passive && PASSIVE_INFO[mon.passive]) {
    html += `<span class="passive-pill" title="${PASSIVE_INFO[mon.passive].desc}">★ ${PASSIVE_INFO[mon.passive].name}</span>`;
  }
  // 상태이상
  if (mon.status) {
    const info = STATUS_INFO[mon.status];
    html += `<span class="status-pill" style="background:${info.color}">${info.icon} ${info.name}</span>`;
  }
  wrap.innerHTML = html;
  wrap.classList.toggle("active", !!(mon.passive || mon.status));
}

// 스킬 효과 (타입별 발사체)
async function playSkillEffect(moveType, attackerSide, defenderSide) {
  const field = $("battle-field");
  const fxLayer = $("fx-layer");
  const attSprite = $(`${attackerSide}-sprite`);
  const defSprite = $(`${defenderSide}-sprite`);

  // 발사 시작점 / 도착점 (fxLayer 기준)
  const fieldRect = field.getBoundingClientRect();
  const attRect = attSprite.getBoundingClientRect();
  const defRect = defSprite.getBoundingClientRect();

  const startX = attRect.left + attRect.width / 2 - fieldRect.left;
  const startY = attRect.top  + attRect.height / 2 - fieldRect.top;
  const endX   = defRect.left + defRect.width / 2 - fieldRect.left;
  const endY   = defRect.top  + defRect.height / 2 - fieldRect.top;

  if (moveType === "normal") {
    // 노말: 슬래시
    const slash = document.createElement("div");
    slash.className = "slash";
    slash.style.left = endX + "px";
    slash.style.top = endY + "px";
    fxLayer.appendChild(slash);
    setTimeout(() => slash.remove(), 400);
    await sleep(280);
  } else {
    // fire / water / grass / spirit: 발사체
    const proj = document.createElement("div");
    proj.className = `projectile ${moveType}`;
    proj.style.left = startX + "px";
    proj.style.top = startY + "px";
    proj.style.transition = "left 0.4s cubic-bezier(0.4, 0, 0.6, 1), top 0.4s cubic-bezier(0.4, 0, 0.6, 1)";
    fxLayer.appendChild(proj);

    requestAnimationFrame(() => {
      proj.style.left = endX + "px";
      proj.style.top = endY + "px";
    });

    await sleep(400);

    const impact = document.createElement("div");
    impact.className = `impact ${moveType}`;
    impact.style.left = endX + "px";
    impact.style.top = endY + "px";
    fxLayer.appendChild(impact);

    proj.remove();
    setTimeout(() => impact.remove(), 550);
  }
}

function popDamage(side, dmg, isCrit, typeMult, label) {
  const sprite = $(`${side}-sprite`);
  const pop = document.createElement("div");
  pop.className = "damage-pop";
  if (isCrit) pop.classList.add("crit");
  if (typeMult > 0 && typeMult < 1) pop.classList.add("weak");
  pop.textContent = label || `-${dmg}`;
  sprite.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

function popHeal(side, amount) {
  const sprite = $(`${side}-sprite`);
  const pop = document.createElement("div");
  pop.className = "damage-pop heal";
  pop.textContent = `+${amount}`;
  sprite.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

// ===== 잡기 시각 효과 =====

// 적 위치 가져오기 (fxLayer 기준)
function getEnemyCenter() {
  const field = $("battle-field").getBoundingClientRect();
  const sprite = $("enemy-sprite").getBoundingClientRect();
  return {
    x: sprite.left + sprite.width / 2 - field.left,
    y: sprite.top + sprite.height / 2 - field.top
  };
}

// 잡기도구 던지기 (적 위치에 등장)
async function playBallThrow() {
  const fxLayer = $("fx-layer");
  const pos = getEnemyCenter();
  const ball = document.createElement("div");
  ball.className = "catch-ball thrown";
  ball.id = "active-catch-ball";
  ball.style.left = pos.x + "px";
  ball.style.top = pos.y + "px";
  fxLayer.appendChild(ball);
  await sleep(550);
}

// 잡기도구 흔들림 (한 번)
async function playBallShake() {
  const ball = $("active-catch-ball");
  if (!ball) return;
  ball.classList.remove("shake");
  void ball.offsetWidth;
  ball.classList.add("shake");
  await sleep(550);
}

// 잡기 실패 (잡기도구 깨지고 적 다시 나타남)
async function playBallBreak() {
  const ball = $("active-catch-ball");
  if (ball) {
    ball.classList.remove("shake");
    ball.classList.add("broken");
    setTimeout(() => ball.remove(), 500);
  }
  // 적 다시 나타나기 (captured 클래스 제거)
  $("enemy-sprite").classList.remove("captured");
  // 실패 X 표시
  const pos = getEnemyCenter();
  const fail = document.createElement("div");
  fail.className = "catch-fail-x show";
  fail.style.left = pos.x + "px";
  fail.style.top = pos.y + "px";
  fail.textContent = "✗";
  $("fx-layer").appendChild(fail);
  setTimeout(() => fail.remove(), 750);
  await sleep(550);
}

// 잡기 성공 (별 폭발 + GET 배너)
async function playBallSuccess(monName, isBoss) {
  const ball = $("active-catch-ball");
  if (ball) {
    ball.classList.remove("shake");
    ball.classList.add("success");
    setTimeout(() => ball.remove(), 600);
  }

  // 화면 빛남
  const field = $("battle-field");
  field.classList.remove("catch-flash");
  void field.offsetWidth;
  field.classList.add("catch-flash");
  setTimeout(() => field.classList.remove("catch-flash"), 700);

  // 별 파티클 8방향
  const pos = getEnemyCenter();
  const fxLayer = $("fx-layer");
  const dirs = [
    [0, -80], [60, -60], [80, 0], [60, 60],
    [0, 80], [-60, 60], [-80, 0], [-60, -60]
  ];
  dirs.forEach((d, i) => {
    const sp = document.createElement("div");
    sp.className = "catch-sparkle fly";
    sp.style.left = pos.x + "px";
    sp.style.top = pos.y + "px";
    sp.style.setProperty("--dx", d[0] + "px");
    sp.style.setProperty("--dy", d[1] + "px");
    sp.textContent = isBoss ? "💎" : "✨";
    fxLayer.appendChild(sp);
    setTimeout(() => sp.remove(), 950);
  });

  // GET 배너
  const banner = document.createElement("div");
  banner.className = "catch-banner show";
  banner.textContent = isBoss ? `${monName} GET! 💎` : `${monName} GET!`;
  fxLayer.appendChild(banner);
  setTimeout(() => banner.remove(), 1450);

  await sleep(1400);
}

// 잡기도구 즉시 제거 (정리용)
function clearCatchBall() {
  const ball = $("active-catch-ball");
  if (ball) ball.remove();
}

async function handleEnemyFaint() {
  // 적 봉황 패시브: 부활 (적은 쿨다운 무시, 한 배틀당 1회만 / 보스는 25%)
  if (state.enemy.passive === "phoenix_rebirth" && state.enemy.phoenixUsedWave === -10) {
    const revivePct = state.isBossWave ? 0.25 : 0.50;
    state.enemy.currentHp = Math.floor(state.enemy.maxHp * revivePct);
    state.enemy.status = null;
    state.enemy.sleepTurns = 0;
    state.enemy.phoenixUsedWave = state.wave;
    ["burn","paralyze","sleep","poison","fear"].forEach(s => $("enemy-sprite").classList.remove(`status-${s}`));
    await showMessage(`🔥 ${state.enemy.name}이(가) 불꽃 속에서 부활했다!`, 1200);
    renderEnemy();
    state.battleLocked = false;
    showActionMenu();
    return;
  }

  $("enemy-sprite").classList.add("faint");
  const wasBoss = state.isBossWave;
  const fallenEnemy = state.enemy;
  const fallenName = state.enemy.name;

  if (wasBoss) {
    await showMessage(`⚔️ 보스 ${fallenName}(이)가 쓰러졌다! ⚔️`, 1200);
  } else {
    await showMessage(`야생의 ${fallenName}(이)가 쓰러졌다!`, 900);
  }

  // 코인 (보스는 3배)
  let coinGain = 15 + state.wave * 5;
  if (wasBoss) coinGain *= 3;
  state.inventory.coins += coinGain;
  state.kills += 1;
  const scoreGain = (50 + state.wave * 10) * (wasBoss ? 3 : 1);
  state.score += scoreGain;

  await showMessage(`+${coinGain} 코인 · +${scoreGain} 점수`, 800);

  // 경험치
  const expGain = state.enemy.level * 36 * (wasBoss ? 2 : 1);
  await grantExp(getActive(), expGain);

  updateTopbar();

  // 보스 처치 → 자동 잡기 시도
  if (wasBoss) {
    await attemptBossCatch(fallenEnemy);
  }

  state.isBossWave = false;
  $("battle-field").classList.remove("boss-mode");
  state.wave += 1;
  spawnNextEnemy();
}

// 보스 처치 후 자동 잡기 (5번, 40% 확률)
async function attemptBossCatch(boss) {
  await sleep(500);

  // 파티 가득 차면 못 잡음
  if (state.party.length >= PARTY_MAX) {
    await showMessage(`파티가 가득 차서 ${boss.name}을(를) 잡을 수 없다...`, 1500);
    state.inventory.gems += 1;
    await showMessage(`💎 다이아 +1 (보스 처치 보상)`, 800);
    updateTopbar();
    return;
  }

  await showMessage(`💫 전설을 잡을 기회! 5번의 도전!`, 1200);

  let caught = false;
  for (let i = 1; i <= 5; i++) {
    await showMessage(`잡기 시도 ${i}/5`, 500);

    // 잡기도구 던지기
    await playBallThrow();
    // 보스가 빨려들어감
    $("enemy-sprite").classList.add("captured");
    await sleep(700);

    const success = Math.random() < 0.40;

    // 흔들림 3번 (긴장감)
    for (let s = 0; s < 3; s++) {
      await playBallShake();
    }

    if (success) {
      caught = true;
      break;
    }
    // 실패: 잡기도구 깨짐 + 적 다시 등장
    await playBallBreak();
    await showMessage(`...실패!`, 400);
  }

  if (caught) {
    // 잡기 성공
    const captured = boss;
    captured.currentHp = Math.floor(captured.maxHp * 0.5);
    captured.status = null;
    captured.sleepTurns = 0;
    captured.exp = 0;
    captured.expToNext = 80 * captured.level;
    state.party.push(captured);
    state.caught += 1;
    state.inventory.gems += 2;

    await playBallSuccess(captured.name, true);
    await showMessage(`🎉 전설 ${captured.name}을(를) 잡았다!`, 1500);
    await showMessage(`💎 다이아 +2 (잡기 성공!)`, 800);
    renderParty();
  } else {
    // 모두 실패
    clearCatchBall();
    state.inventory.gems += 1;
    await showMessage(`😔 ${boss.name}이(가) 도망쳤다...`, 1200);
    await showMessage(`💎 다이아 +1 (처치 보상)`, 800);
  }
  updateTopbar();
}

async function grantExp(mon, amount) {
  mon.exp += amount;
  await showMessage(`${mon.name} +${amount} EXP`, 600);
  while (mon.exp >= mon.expToNext) {
    mon.exp -= mon.expToNext;
    mon.level += 1;
    // 비율 보존 HP
    const ratio = mon.currentHp / mon.maxHp;
    mon.maxHp = Math.floor(mon.maxHp * 1.05);
    mon.atk = Math.floor(mon.atk * 1.05);
    mon.def = Math.floor(mon.def * 1.05);
    mon.spd = Math.floor(mon.spd * 1.05);
    mon.currentHp = Math.max(1, Math.floor(mon.maxHp * ratio));
    mon.expToNext = 80 * mon.level;
    await showMessage(`🎉 레벨 업! ${mon.name} Lv${mon.level}`, 800);

    // 레벨업 보너스: HP 15% 회복
    const heal = Math.floor(mon.maxHp * 0.15);
    const before = mon.currentHp;
    mon.currentHp = Math.min(mon.maxHp, mon.currentHp + heal);
    const actual = mon.currentHp - before;
    if (actual > 0) {
      popHeal("player", actual);
      updateHpBar("player", mon);
      $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
      await showMessage(`💚 ${mon.name}이(가) 활력을 되찾았다! +${actual} HP`, 600);
    }
  }
  renderPlayer();
  renderParty();
}

async function handlePlayerFaint() {
  const fallen = getActive();

  // 봉황 패시브: 부활 (5웨이브 쿨다운)
  if (fallen.passive === "phoenix_rebirth"
      && state.wave - fallen.phoenixUsedWave >= 5) {
    fallen.currentHp = Math.floor(fallen.maxHp * 0.5);
    fallen.status = null;
    fallen.sleepTurns = 0;
    fallen.phoenixUsedWave = state.wave;
    ["burn","paralyze","sleep","poison","fear"].forEach(s => $("player-sprite").classList.remove(`status-${s}`));
    await showMessage(`🔥 ${fallen.name}이(가) 불꽃 속에서 부활했다!`, 1200);
    renderPlayer();
    renderParty();
    state.battleLocked = false;
    showActionMenu();
    return;
  }

  $("player-sprite").classList.add("faint");
  await showMessage(`${fallen.name}(이)가 쓰러졌다...`, 1200);

  // 죽은 몬스터를 파티에서 제거
  const fallenIdx = state.activeIdx;
  state.party.splice(fallenIdx, 1);

  // 살아있는 몬스터 있는지 확인
  if (state.party.length === 0) {
    endGame();
    return;
  }

  // 활성 인덱스 갱신 (앞 인덱스 제거로 뒤가 당겨졌으면 0번으로)
  // 단, 배열이 1개만 남았으면 자동으로 0
  state.activeIdx = 0;

  // 한 마리만 남았으면 자동 전투 진행
  if (state.party.length === 1) {
    $("player-sprite").classList.remove("faint");
    renderPlayer();
    renderParty();
    await showMessage(`${getActive().name}, 가라!`, 700);
    state.battleLocked = false;
    showActionMenu();
    return;
  }

  // 2마리 이상 있으면 강제 교체 메뉴
  renderParty();
  await showMessage("다음 몬스터를 선택하세요!", 700);
  showPartyMenu(true);  // forced=true
}

// ===== 교체 시스템 =====
function showPartyMenu(forced = false) {
  if (state.battleLocked && !forced) return;
  // 쿨다운 체크 (강제 교체는 무시)
  if (!forced && state.swapCooldown > 0) {
    flashMessage(`교체 쿨타임! ${state.swapCooldown}턴 남음`);
    return;
  }
  const modal = $("modal-content");
  let html = `<div class="modal-title">${forced ? "강제 교체" : "파티 교체"}</div><div class="party-list">`;
  state.party.forEach((mon, i) => {
    const isActive = i === state.activeIdx;
    const isFainted = mon.currentHp <= 0;
    const disabled = isActive || isFainted;
    const hpPct = (mon.currentHp / mon.maxHp) * 100;
    let hpCls = "";
    if (hpPct < 25) hpCls = "low";
    else if (hpPct < 50) hpCls = "mid";
    html += `
      <div class="party-item ${isActive ? 'active' : ''} ${disabled ? 'disabled' : ''}"
           ${disabled ? '' : `onclick="swapTo(${i}, ${forced})"`}>
        <img src="${IMAGES[mon.id]}" alt="${mon.name}">
        <div class="party-item-info">
          <div class="party-item-name">${mon.name} <span class="type-badge type-${mon.type}">${TYPES[mon.type].name}</span></div>
          <div class="party-item-meta">Lv ${mon.level} · HP ${mon.currentHp}/${mon.maxHp} ${isFainted ? '· (쓰러짐)' : ''} ${isActive ? '· (전투중)' : ''}</div>
          <div class="party-item-hp"><div class="party-item-hp-fill ${hpCls}" style="width:${hpPct}%"></div></div>
        </div>
      </div>
    `;
  });
  html += `</div>`;
  if (!forced) html += `<button class="modal-close" onclick="closeModal()">취소</button>`;
  modal.innerHTML = html;
  $("modal-bg").classList.add("show");
}

async function swapTo(idx, forced) {
  closeModal();
  state.activeIdx = idx;
  // 이전 sprite의 faint/hit/attacking 클래스 제거
  $("player-sprite").classList.remove("faint", "hit", "attacking");

  // 별정령 패시브: 교체되어 나왔을 때 첫 공격 부스트 활성화
  const newActive = getActive();
  if (newActive.passive === "stars_grace") {
    newActive.starGraceBoost = true;
  }

  renderPlayer();
  renderParty();
  await showMessage(`${getActive().name}, 가라!`, 700);

  if (forced) {
    // 강제 교체 - 적의 턴 안 거치고 바로 행동, 쿨다운 X
    state.battleLocked = false;
    showActionMenu();
  } else {
    // 일반 교체 - 쿨다운 2턴 설정 + 적이 한 턴 공격
    state.swapCooldown = 2;
    state.battleLocked = true;
    hideAllMenus();
    await executeAttack(state.enemy, getActive(), "enemy", "player", pickRandom(state.enemy.moves));
    if (getActive().currentHp <= 0) { await handlePlayerFaint(); return; }
    state.battleLocked = false;
    showActionMenu();
  }
}

// ===== 잡기 시스템 =====
async function attemptCatch() {
  if (state.battleLocked) return;
  if (state.inventory.balls <= 0) {
    flashMessage("잡기 도구가 없다! 상점에서 구매하세요");
    return;
  }
  if (state.party.length >= PARTY_MAX) {
    flashMessage("파티가 가득 찼다! (최대 3마리)");
    return;
  }

  state.battleLocked = true;
  hideAllMenus();
  state.inventory.balls -= 1;
  updateTopbar();

  await showMessage(`잡기 도구를 던졌다!`, 600);

  // 잡기도구 던지기
  await playBallThrow();

  // 적이 잡기도구에 빨려들어가는 효과
  $("enemy-sprite").classList.add("captured");
  await sleep(900);

  // 성공률: HP가 낮을수록 높음
  const hpRatio = state.enemy.currentHp / state.enemy.maxHp;
  const successRate = Math.max(0.05, Math.min(0.95, 1 - hpRatio * 0.95));
  const success = Math.random() < successRate;

  // 흔들림 3번 (시각 효과)
  for (let i = 0; i < 3; i++) {
    await playBallShake();
  }

  if (success) {
    // 잡기 성공
    const captured = state.enemy;
    captured.currentHp = Math.floor(captured.maxHp * 0.5);
    captured.status = null;
    captured.sleepTurns = 0;
    captured.exp = 0;
    captured.expToNext = 80 * captured.level;
    state.party.push(captured);
    state.caught += 1;

    await playBallSuccess(captured.name, false);

    await showCaptureModal(captured);
    renderParty();
    updateTopbar();

    // 잡았으면 다음 웨이브로
    state.wave += 1;
    spawnNextEnemy();
  } else {
    // 잡기 실패 - 잡기도구 깨지고 적 다시 나타남
    await playBallBreak();
    await showMessage("앗! 빠져나왔다!", 700);
    // 실패 시 적이 한 번 공격
    await executeAttack(state.enemy, getActive(), "enemy", "player", pickRandom(state.enemy.moves));
    if (getActive().currentHp <= 0) { await handlePlayerFaint(); return; }
    state.battleLocked = false;
    showActionMenu();
  }
}

function showCaptureModal(mon) {
  return new Promise(resolve => {
    const modal = $("modal-content");
    modal.innerHTML = `
      <div class="capture-card">
        <img src="${IMAGES[mon.id]}" alt="${mon.name}">
        <div class="capture-name">${mon.name} 획득!</div>
        <div class="capture-msg">Lv ${mon.level} · 파티에 추가되었습니다</div>
      </div>
      <button class="modal-close" id="capture-ok">확인</button>
    `;
    $("modal-bg").classList.add("show");
    $("capture-ok").onclick = () => {
      closeModal();
      resolve();
    };
  });
}
