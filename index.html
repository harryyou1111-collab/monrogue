// ===== 레벨업 시스템 =====
const MAX_LEVEL = 15;
function levelUpCost(level) { return Math.ceil(level / 3); }   // 1~3렙=1, 4~6=2, 7~9=3, 10~12=4, 13~15=5 (사탕)
function getMonLevel(id) { return (state.monLevels && state.monLevels[id]) || 1; }
function tryLevelUp(monId) {
  const lv = getMonLevel(monId);
  if (lv >= MAX_LEVEL) return;
  const cost = levelUpCost(lv);
  if ((state.candies[monId] || 0) < cost) return;
  state.candies[monId] -= cost;
  if (!state.monLevels) state.monLevels = {};
  state.monLevels[monId] = lv + 1;
  saveProgress();
  openMonDetail(monId);   // 상세 새로고침
}

function makeInstance(monId, level) {
  const base = MONSTERS[monId];
  const factor = 1 + (level - 1) * 0.05;
  const rawHp  = base.stats.hp;
  const rawAtk = base.stats.atk;
  const rawDef = base.stats.def;
  // 방어 → HP/공격 보너스 (방어×10 HP, 방어×1 공격)
  const bonusHp  = rawDef * 10;
  const bonusAtk = rawDef * 1;
  const finalHp  = Math.floor((rawHp + bonusHp) * factor);
  const finalAtk = Math.floor((rawAtk + bonusAtk) * factor);
  return {
    id: base.id,
    name: base.name,
    type: base.type,
    rarity: base.rarity || "common",
    passive: null, // 패시브 전부 비활성화
    facing: base.facing,
    maxHp: finalHp,
    currentHp: finalHp,
    atk: finalAtk,
    def: Math.floor(rawDef * factor),  // 표시용으로만 유지 (데미지 공식엔 미사용)
    spd: Math.floor(base.stats.spd * factor),
    moves: [...base.moves],
    level: level,
    status: null,
    sleepTurns: 0,
    // === 효과 시스템 ===
    activeEffects: [],
    // === 쿨다운 추적 (moveKey → 남은 턴 수) ===
    cooldowns: {},
    // 패시브 추적
    phoenixUsedWave: -10,
    starGraceBoost: false
  };
}

// ============================================================
// === 효과 적용/계산 시스템 (2단계) ===
// ============================================================

// 회복 방해 배율 반환 (heal_block 효과 중 최대값 적용)
function getHealBlockMult(mon) {
  if (!mon.activeEffects) return 1.0;
  let maxBlock = 0;
  mon.activeEffects.forEach(e => {
    if (e.kind === "heal_block") maxBlock = Math.max(maxBlock, e.value);
  });
  return 1 - maxBlock / 100;
}

// 효과 적용: 스킬의 effects 배열을 시전자/대상에 적용
// caster=시전자 인스턴스, target=상대 인스턴스
function applyEffects(effectList, caster, target, moveKey) {
  if (!effectList || effectList.length === 0) return [];
  const messages = [];
  effectList.forEach(e => {
    const recipient = (e.target === "enemy") ? target : caster;
    if (!recipient) return;

    // 확률 효과: chance 있으면 굴림 (암습 30%, 블랙아웃 50% 등)
    if (e.chance !== undefined && Math.random() >= e.chance) {
      return; // 실패 시 효과 미적용
    }

    // 공포 상태면 버프(isBuff) 효과를 받을 수 없음
    const edef = EFFECT_DEFS[e.kind];
    if (recipient.activeEffects && recipient.activeEffects.some(x => x.kind === "fear")
        && edef && edef.isBuff && (e.target === "self")) {
      messages.push(`${recipient.name}은(는) 공포로 강화할 수 없다!`);
      return;
    }

    // === 즉발 특수 효과 ===
    if (e.kind === "cleanse") {
      // 모든 부정적 효과 해제 (status + 디버프성 active effects)
      const before = (recipient.activeEffects || []).length;
      recipient.activeEffects = (recipient.activeEffects || []).filter(x => {
        const d = EFFECT_DEFS[x.kind];
        return d && d.isBuff;  // 버프만 유지, 디버프 다 제거
      });
      const removedBuffs = before - recipient.activeEffects.length;
      // 옛 상태이상도 해제
      if (recipient.status) {
        recipient.status = null;
        recipient.sleepTurns = 0;
      }
      messages.push(`${recipient.name} 부정적 효과 해제!`);
      return;
    }
    if (e.kind === "phoenix_revive") {
      // 피닉스 노바 표식: 다음 사망 시 1회 부활
      recipient.phoenixRevivePending = true;
      messages.push(`${recipient.name} 불꽃의 표식이 새겨졌다!`);
      return;
    }
    if (e.kind === "heal") {
      const blockMult = getHealBlockMult(recipient);
      const healAmt = Math.floor(recipient.maxHp * e.value / 100 * blockMult);
      recipient.currentHp = Math.min(recipient.maxHp, recipient.currentHp + healAmt);
      if (blockMult < 1) messages.push(`${recipient.name} HP ${healAmt} 회복! (회복 방해)`);
      else messages.push(`${recipient.name} HP ${healAmt} 회복!`);
      return;
    }
    if (e.kind === "heal_party") {
      // 아군 전체 완전 회복 (월화난무)
      state.party.forEach(m => { if (m.currentHp > 0) m.currentHp = m.maxHp; });
      messages.push(`아군 전체가 완전히 회복했다!`);
      return;
    }

    // === 지속 효과 ===
    const def = EFFECT_DEFS[e.kind];
    if (!def) return;
    const effectObj = {
      kind: e.kind,
      value: e.value,
      duration: e.duration,
      sourceAtk: caster.atk,
      sourceMove: moveKey || null
    };
    // schedule 배열 있으면 복사 (아쿠아 리젠 등)
    if (e.schedule) effectObj.schedule = [...e.schedule];
    // onExpire 콜백 있으면 복사 (해왕 강림 등)
    if (e.onExpire) effectObj.onExpire = e.onExpire;
    // 사망 트리거 / 무한지속 메타데이터 (풀 스킬)
    if (e.onEnemyDeath) effectObj.onEnemyDeath = e.onEnemyDeath;
    if (e.onSelfDeath) effectObj.onSelfDeath = e.onSelfDeath;
    if (e.untilDeath) effectObj.untilDeath = e.untilDeath;
    if (e.onEndure) effectObj.onEndure = e.onEndure;
    addOrRefreshEffect(recipient, effectObj);
    const sign = def.sign > 0 ? "↑" : (def.sign < 0 ? "↓" : "");
    messages.push(`${recipient.name} ${def.label}${sign}`);
  });
  return messages;
}

// 중첩 규칙:
//   - duration 9999 (영구) → 절대 덮어쓰지 않음, 항상 보존
//   - 같은 kind + 같은 sourceMove → 갱신 (리프레시)
//   - 같은 kind + 다른 sourceMove → 중첩 추가
function addOrRefreshEffect(mon, effect) {
  if (!mon.activeEffects) mon.activeEffects = [];
  // 영구 버프는 새 효과로 덮어쓰지 않음 (피닉스 부활 버프 보호)
  // 단, 새 효과도 영구라면 그냥 추가
  // 같은 sourceMove가 있으면 갱신
  const sameSource = mon.activeEffects.find(
    e => e.kind === effect.kind && e.sourceMove === effect.sourceMove && e.duration !== 9999
  );
  if (sameSource) {
    sameSource.value = effect.value;
    sameSource.duration = effect.duration;
    sameSource.sourceAtk = effect.sourceAtk;
    if (effect.schedule) sameSource.schedule = [...effect.schedule];
    if (effect.onExpire) sameSource.onExpire = effect.onExpire;
    sameSource.turnIndex = 0; // 리프레시 시 turnIndex 리셋
    sameSource.justApplied = true;
  } else {
    mon.activeEffects.push({ ...effect, justApplied: true, schedule: effect.schedule ? [...effect.schedule] : undefined });
  }
}

// 특정 종류의 효과 값 합산 반환 (해당 stat의 ± 배율)
// 예: getStatMultiplier(mon, "atk") → 공격력 버프/디버프 반영한 배율 (1.3, 0.7 등)
function getStatMultiplier(mon, stat) {
  if (!mon.activeEffects) return 1.0;
  let mult = 1.0;
  mon.activeEffects.forEach(e => {
    const def = EFFECT_DEFS[e.kind];
    if (def && def.stat === stat) {
      // schedule 있는 effect는 현재 turnIndex 기준 value 사용
      let val = e.value;
      if (e.schedule && e.schedule.length > 0) {
        const idx = Math.min((e.turnIndex || 0), e.schedule.length - 1);
        val = e.schedule[idx];
      }
      mult *= (1 + def.sign * val / 100);
    }
  });
  return mult;
}

// 매 턴 효과 처리: 지속피해/지속회복 적용, 지속시간 감소, 만료 제거
// 반환: 화면에 표시할 메시지 배열
function tickEffects(mon) {
  if (!mon.activeEffects || mon.activeEffects.length === 0) return [];
  const messages = [];
  const survivors = [];
  const expiredCallbacks = [];
  mon.activeEffects.forEach(e => {
    // 방금 적용된 일부 효과는 이번 턴 tick 건너뜀 (적용 턴에 깎이는 버그 방지)
    // delayed_bolt(지연폭발), stun(스턴)만 해당 — 기존 버프 밸런스 유지
    if (e.justApplied && (e.kind === "delayed_bolt" || e.kind === "stun")) {
      e.justApplied = false;
      survivors.push(e);
      return;
    }
    e.justApplied = false;
    // 화상 - 매턴 고정 피해
    if (e.kind === "burn") {
      const dmg = Math.floor(mon.maxHp * e.value / 100);
      mon.currentHp = Math.max(0, mon.currentHp - dmg);
      messages.push(`${mon.name} 화상 피해 ${dmg}!`);
    }
    // regen - 매턴 HP 회복 (schedule 있으면 턴별 다른 값, 없으면 고정 value)
    if (e.kind === "regen") {
      if (!e.turnIndex) e.turnIndex = 0;
      let pct;
      if (e.schedule && e.schedule.length > 0) {
        pct = e.schedule[Math.min(e.turnIndex, e.schedule.length - 1)];
      } else {
        pct = e.value;
      }
      e.turnIndex++;
      const healAmt = Math.floor(mon.maxHp * pct / 100 * getHealBlockMult(mon));
      const before = mon.currentHp;
      mon.currentHp = Math.min(mon.maxHp, mon.currentHp + healAmt);
      const actual = mon.currentHp - before;
      if (actual > 0) messages.push(`${mon.name} 재생 회복 +${actual}!`);
    }
    // 지속시간 감소 (untilDeath는 영구 유지)
    if (e.untilDeath) {
      survivors.push(e);
    } else {
      e.duration -= 1;
      if (e.duration > 0) {
        survivors.push(e);
      } else {
        // 만료 콜백 (onExpire) 수집
        if (e.onExpire) expiredCallbacks.push(e.onExpire);
        // 지연 폭발 (전력 과부하) - 시전자 공격력 × 2.5
        if (e.kind === "delayed_bolt") {
          const boltDmg = Math.max(1, Math.floor((e.sourceAtk || mon.atk) * 2.5));
          mon.currentHp = Math.max(0, mon.currentHp - boltDmg);
          messages.push(`🌩️ 과부하 폭발! ${mon.name}에게 ${boltDmg} 피해!`);
        }
      }
    }
  });
  mon.activeEffects = survivors;
  // 만료 콜백 실행
  expiredCallbacks.forEach(cb => {
    if (cb === "full_heal") {
      mon.currentHp = mon.maxHp;
      messages.push(`${mon.name} 완전 회복!`);
    }
  });
  return messages;
}

// 효과 전부 제거 (교체/전투 종료 시)
function clearEffects(mon) {
  if (mon) {
    mon.activeEffects = [];
    mon.cooldowns = {};  // 쿨다운도 같이 리셋
  }
}

// === 쿨다운 시스템 ===
// 스킬 사용 시 쿨다운 등록
function setCooldown(mon, moveKey) {
  const move = MOVES[moveKey];
  if (!move) return;
  // 판당 1회 표시
  if (move.onceBattle) {
    if (!mon.battleUsed) mon.battleUsed = {};
    mon.battleUsed[moveKey] = true;
  }
  if (!move.cooldown || move.cooldown <= 0) return;
  if (!mon.cooldowns) mon.cooldowns = {};
  // +1 하는 이유: 이 턴 끝에 -1 되므로 의도한 쿨다운 턴수 유지
  let cd = move.cooldown + 1;
  // 공포 패널티: 공포 상태에서 쿨 스킬 사용 시 쿨+1 (공포당 1회만)
  if (mon.activeEffects) {
    const fearEff = mon.activeEffects.find(e => e.kind === "fear");
    if (fearEff && !fearEff.coolPenaltyUsed) {
      cd += 1;
      fearEff.coolPenaltyUsed = true;
    }
  }
  mon.cooldowns[moveKey] = cd;
}
// 사용 가능 여부 확인
function isMoveAvailable(mon, moveKey) {
  // 판당 1회 사용 스킬 체크
  const move = MOVES[moveKey];
  if (move && move.onceBattle) {
    if (mon.battleUsed && mon.battleUsed[moveKey]) return false;
  }
  // 스턴 체크: 스턴 상태면 모든 스킬 사용 불가
  if (isStunned(mon)) return false;
  // 스킬 봉인 체크: skill_lock 효과가 있으면 해당 슬롯 잠금
  if (isMoveLocked(mon, moveKey)) return false;
  if (!mon.cooldowns) return true;
  return !mon.cooldowns[moveKey] || mon.cooldowns[moveKey] <= 0;
}
// 특정 스킬이 봉인됐는지 (skill_lock의 value = 잠글 슬롯 인덱스)
function isMoveLocked(mon, moveKey) {
  if (!mon.activeEffects) return false;
  const slotIdx = mon.moves ? mon.moves.indexOf(moveKey) : -1;
  if (slotIdx < 0) return false;
  return mon.activeEffects.some(e => e.kind === "skill_lock" && e.value === slotIdx);
}
// 스턴 상태 여부 (스킬 사용 불가, 교체는 가능)
function isStunned(mon) {
  return mon.activeEffects ? mon.activeEffects.some(e => e.kind === "stun") : false;
}
// 남은 쿨다운 (0이면 사용 가능)
function getCooldown(mon, moveKey) {
  if (!mon.cooldowns) return 0;
  return mon.cooldowns[moveKey] || 0;
}
// 매 턴 쿨다운 1 감소
function tickCooldowns(mon) {
  if (!mon.cooldowns) return;
  for (const key in mon.cooldowns) {
    if (mon.cooldowns[key] > 0) mon.cooldowns[key] -= 1;
  }
}

// === 적 AI: 사용 가능한 스킬 중 점수 기반 선택 ===
function chooseEnemyMove(enemy, player) {
  if (!enemy || !enemy.moves) return null;
  // 쿨다운 안 걸린 스킬만 후보
  let available = enemy.moves.filter(k => MOVES[k] && isMoveAvailable(enemy, k));
  // 다 쿨다운이면 첫 번째 (방어막 — 거의 일어나면 안 됨)
  if (available.length === 0) available = enemy.moves;
  // 점수 계산: 데미지 추정 + 효과 가산
  let best = available[0];
  let bestScore = -Infinity;
  available.forEach(k => {
    const m = MOVES[k];
    let score = 0;
    // 데미지 추정 (배율 기반)
    if (m.multiplier !== undefined) {
      score += enemy.atk * m.multiplier;
    } else if (m.power) {
      // 구 시스템 공식 추정
      score += m.power * enemy.atk / Math.max(20, player.def || 30) * 0.4;
    }
    // 타입 상성 보너스
    const tm = TYPE_CHART[m.type]?.[player.type] ?? 1.0;
    score *= tm;
    // 효과 가산
    if (m.effects) {
      m.effects.forEach(e => {
        if (e.kind === "burn") score += (player.maxHp * (e.value/100)) * e.duration * 0.7;
        if (e.kind === "atk_up" && e.target === "self") score += 50;
        if (e.kind === "spd_up" && e.target === "self") score += 30;
        if (e.kind === "def_up" && e.target === "self") score += 40;
      });
    }
    // 선제기 살짝 보너스 (속도 안 봐도 됨)
    if (m.priority && m.priority > 0) score += 20;
    // 살짝 랜덤 흔들어서 매번 같은 선택 안 하게
    score *= 1 + (Math.random() - 0.5) * 0.2;
    if (score > bestScore) { bestScore = score; best = k; }
  });
  return best;
}

// === 피닉스 부활 체크 ===
// 사망 직전 호출. 부활 표식이 있으면 부활시키고 true 반환.
async function tryPhoenixRevive(mon, side) {
  if (!mon || mon.currentHp > 0) return false;
  // === 불굴(endure) - 스타버스트: HP1로 버티고 상대에게 카운터딜 ===
  if (mon.activeEffects) {
    const endureEff = mon.activeEffects.find(e => e.kind === "endure");
    if (endureEff) {
      // 불굴 소모
      mon.activeEffects = mon.activeEffects.filter(e => e.kind !== "endure");
      mon.currentHp = 1;
      updateHpBar(side, mon);
      if (side === "player") {
        $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
        renderParty();
      }
      renderMonStatus(side, mon);
      await showMessage(`✨ ${mon.name}이(가) 불굴의 의지로 버텼다! (HP 1)`, 1000);
      // 카운터딜: 상대에게 자기 공격력 ×2
      if (endureEff.onEndure === "star_counter") {
        const opp = (side === "player") ? state.enemy : getActive();
        const oppSide = (side === "player") ? "enemy" : "player";
        if (opp && opp.currentHp > 0) {
          const counterDmg = Math.max(1, Math.floor(mon.atk * 2));
          opp.currentHp = Math.max(0, opp.currentHp - counterDmg);
          popDamage(oppSide, counterDmg, false, 1, `-${counterDmg}`);
          updateHpBar(oppSide, opp);
          if (oppSide === "player") {
            $("player-hp-text").textContent = `${opp.currentHp} / ${opp.maxHp}`;
            renderParty();
          }
          await showMessage(`💥 별의 반격! ${opp.name}에게 ${counterDmg} 피해!`, 1000);
        }
      }
      return true;
    }
  }
  if (!mon.phoenixRevivePending) return false;
  mon.phoenixRevivePending = false;
  mon.currentHp = Math.floor(mon.maxHp * 0.5);
  mon.status = null;
  mon.sleepTurns = 0;
  mon.activeEffects = [];
  // 영구 +15% (큰 duration으로 사실상 영구)
  mon.activeEffects.push({ kind: "atk_up", value: 15, duration: 9999 });
  mon.activeEffects.push({ kind: "spd_up", value: 15, duration: 9999 });
  mon.activeEffects.push({ kind: "def_up", value: 15, duration: 9999 });
  // UI 갱신
  updateHpBar(side, mon);
  if (side === "player") {
    $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
    renderParty();
  }
  renderMonStatus(side, mon);
  await showMessage(`불꽃이 다시 타오른다! ${mon.name} 부활!`, 1000);
  return true;
}

// 선공 판정 (priority 우선, 같으면 속도 비교)
function decideFirstAttacker(playerMove, enemyMove, player, enemy) {
  const pPrio = (playerMove && MOVES[playerMove] && MOVES[playerMove].priority) || 0;
  const ePrio = (enemyMove && MOVES[enemyMove] && MOVES[enemyMove].priority) || 0;
  if (pPrio !== ePrio) return (pPrio > ePrio) ? "player" : "enemy";
  // 속도 동률이면 50/50
  const pSpd = effectiveSpd(player);
  const eSpd = effectiveSpd(enemy);
  if (pSpd === eSpd) return Math.random() < 0.5 ? "player" : "enemy";
  return (pSpd > eSpd) ? "player" : "enemy";
}
// ============================================================

// 적 인스턴스 (웨이브 기반 스케일)
function makeEnemy(monId, wave) {
  const inst = makeInstance(monId, wave);
  return inst;
}

function calcDamage(attacker, defender, moveKey) {
  let move = MOVES[moveKey];

  // === 조건부 스킬 (HP 비율 따라 갈림) ===
  // 원본 move 객체를 안 건드리고 효과적 move를 만들어 사용
  if (move.conditional) {
    const hpPct = (attacker.currentHp / attacker.maxHp) * 100;
    const branch = hpPct > move.conditional.hpThreshold
      ? move.conditional.above
      : move.conditional.below;
    move = Object.assign({}, move, branch);
  }

  // 데미지 없는 스킬 (회복/버프 전용)
  if ((move.power === 0 && move.multiplier === undefined) || move.multiplier === 0) {
    return { damage: 0, typeMult: 1, isCrit: false, move };
  }

  const typeMult = 1.0; // 상성 임시 비활성화
  const stab = (move.type === attacker.type) ? 1.5 : 1.0;
  const randMult = rand(0.92, 1.0);  // 변동폭 약간 축소 (큰 숫자 시대)

  // 크리 확률 (임시 비활성화)
  const crit = 1.0;

  // 화상 시 공격력 50% 다운 (기존 상태이상)
  const burnMod = (attacker.status === "burn") ? 0.5 : 1.0;
  // 공포 데미지 보정 제거 (새 공포는 딜에 영향 없음)
  const fearMod = 1.0;
  // 패시브 전부 비활성화
  const darkReignMod = 1.0;
  let starBoostMod = 1.0;

  // === JWA식 데미지 공식 ===
  // multiplier가 있으면: 시전자 공격력 × multiplier (예: 0.5, 1.0, 1.8)
  // 없으면: 기존 power 방식 (구 스킬 호환)
  const effectiveAtk = attacker.atk * burnMod * starBoostMod * getStatMultiplier(attacker, "atk");
  let base;
  if (move.multiplier !== undefined) {
    // 새 시스템: 시전자 공격 × multiplier (방어 스탯 무시)
    base = effectiveAtk * move.multiplier;
  } else {
    // 구 시스템 호환: 기존 공식 (def 사용)
    base = (move.power * effectiveAtk / Math.max(1, defender.def)) * 0.4;
  }

  // 방어 버프 적용 (있으면 받는 데미지 감소)
  // 예: def_up +30% 걸려있으면 받는 데미지 × (1 / 1.30) ≈ 0.77
  const defBuffMult = 1 / Math.max(0.5, getStatMultiplier(defender, "def"));

  const damage = Math.floor(base * typeMult * stab * randMult * crit * fearMod * darkReignMod * defBuffMult);

  // 멀티히트 (가시탄: HP 차이 기반 1~3히트)
  let hits = 1;
  if (move.multiHit === "hp_diff") {
    const diff = defender.maxHp - attacker.maxHp;
    if (diff >= 200) hits = 3;
    else if (diff >= 100) hits = 2;
    else hits = 1;
  }

  return { damage: Math.max(1, damage) * hits, typeMult, isCrit: crit > 1, move, hits };
}

// 스피드 계산 (마비 50% 디버프 + 속도 버프/디버프 반영)
function effectiveSpd(mon) {
  const paraMod = (mon.status === "paralyze") ? 0.5 : 1.0;
  return mon.spd * paraMod * getStatMultiplier(mon, "spd");
}

// ===== 시작 화면 =====
function renderStartScreen() {
  const grid = $("monster-grid");
  grid.innerHTML = "";
  // ownedMons 기반으로만 렌더링 (영구 보유 중인 몬스터만 시작 가능)
  state.ownedMons.forEach(id => {
    const mon = MONSTERS[id];
    if (!mon) return;
    const card = document.createElement("div");
    card.className = `mon-card rarity-${mon.rarity || 'common'} type-${mon.type}`;
    card.dataset.id = id;
    card.style.setProperty('--type', TYPE_RGB[mon.type] || '141,151,166');
    card.innerHTML = `
      <div class="cc-inner">
        <div class="cc-corner"><span>${TYPES[mon.type].name}</span></div>
        <div class="cc-art"><img src="${IMAGES[id]}" alt="${mon.name}"></div>
        <div class="cc-name">${mon.name}</div>
      </div>
    `;
    card.onclick = () => toggleSelectMon(id);
    grid.appendChild(card);
  });
  // 진입 시 선택 초기화
  state.selectedIds = [];
  refreshSelectUI();
}

function toggleSelectMon(id) {
  const i = state.selectedIds.indexOf(id);
  if (i >= 0) {
    state.selectedIds.splice(i, 1);          // 이미 선택됨 → 해제
  } else {
    if (state.selectedIds.length >= 3) return; // 3마리 초과 불가
    state.selectedIds.push(id);
  }
  refreshSelectUI();
}

function refreshSelectUI() {
  // 그리드 카드: 선택된 것만 외곽선
  document.querySelectorAll("#start-screen .mon-card").forEach(c => {
    c.classList.toggle("selected", state.selectedIds.indexOf(c.dataset.id) >= 0);
  });
  // 상단 트레이: 선택한 3마리 표시 (빈 칸은 점선)
  const tray = $("select-tray");
  if (tray) {
    let html = "";
    for (let i = 0; i < 3; i++) {
      const id = state.selectedIds[i];
      if (id) {
        const m = MONSTERS[id];
        const rc = m.rarity === "legendary" ? "#f7cf4a" : m.rarity === "rare" ? "#5cc8ff" : "#8d97a6";
        html += `<div class="tray-slot filled" onclick="toggleSelectMon('${id}')">
          <div class="pic" style="border-color:${rc}"><img src="${IMAGES[id]}" alt="${m.name}"></div>
          <div class="nm">${m.name}</div></div>`;
      } else {
        html += `<div class="tray-slot empty"><div class="pic">+</div><div class="nm">&nbsp;</div></div>`;
      }
    }
    tray.innerHTML = html;
  }
  const n = state.selectedIds.length;
  const btn = $("start-btn");
  btn.disabled = (n !== 3);
  btn.textContent = (n === 3) ? "이 3마리로 시작" : `${n} / 3 선택`;
}

$("start-btn").onclick = () => {
  if (state.selectedIds.length !== 3) return;
  startNewRun(state.selectedIds.slice());
};

// ===== 게임 시작 =====
function startNewRun(monIds) {
  const ids = Array.isArray(monIds) ? monIds : [monIds];
  // 상태 클래스 cleanup
  $("player-sprite").classList.remove("faint", "hit", "captured", "attacking");
  $("enemy-sprite").classList.remove("faint", "hit", "captured", "attacking");
  $("battle-field").classList.remove("shake");
  $("battle-flash").classList.remove("flash-hit");
  $("fx-layer").innerHTML = "";

  state.party = ids.map(id => makeInstance(id, getMonLevel(id)));   // 저장된 영구 레벨로 시작
  state.activeIdx = 0;
  state.stage = state.stage || 1;
  state.wave = state.stage;     // 보상/스케일 공식 호환용 (스테이지 번호로 취급)
  state.kills = 0;
  state.caught = 0;
  state.score = 0;
  state.inventory = { potions: 2, coins: 0, gems: 0 };
  state.battleLocked = true;
  state.swapCooldown = 0;
  state.isBossWave = false;

  showScreen("battle-screen");
  setupEnemyTeam(state.stage);   // 적 3마리 팀 구성
  renderPlayer();
  renderParty();
  updateTopbar();
  startStageBattle();
}

// 스테이지용 적 3마리 팀 구성 (스테이지맵 연동 전까지는 랜덤 3마리)
function setupEnemyTeam(stage) {
  const commonIds = ALL_MON_IDS.filter(id => MONSTERS[id].rarity !== "legendary");
  const team = [];
  const used = {};
  while (team.length < 3 && team.length < commonIds.length) {
    const id = pickRandom(commonIds);
    if (used[id]) continue;
    used[id] = true;
    team.push(makeEnemy(id, stage));
  }
  state.enemyParty = team;
  state.enemyIdx = 0;
  state.enemy = state.enemyParty[0];
  state.isBossWave = false;
}

// 적 팀 중 idx번째를 전장에 등장
function activateEnemy(idx) {
  state.enemyIdx = idx;
  state.enemy = state.enemyParty[idx];
  $("enemy-sprite").classList.remove("faint", "hit", "captured", "attacking");
  ["burn","paralyze","sleep","poison","fear"].forEach(s => $("enemy-sprite").classList.remove(`status-${s}`));
  renderEnemy();
}

// 스테이지 전투 시작 (첫 적 등장)
function startStageBattle() {
  $("enemy-sprite").classList.remove("faint", "hit", "captured", "attacking");
  $("fx-layer").innerHTML = "";
  activateEnemy(0);
  renderPlayer();
  renderParty();
  updateTopbar();
  hideAllMenus();
  queueMessage(`적 ${state.enemyParty.length}마리가 나타났다!`);
  queueMessage(`${state.enemy.name}(이)가 앞장섰다!`);
  queueAction(() => {
    showActionMenu();
    state.battleLocked = false;
  });
  startMessages();
}

function spawnNextEnemy() {
  $("enemy-sprite").classList.remove("faint", "hit", "captured", "attacking");
  $("player-sprite").classList.remove("faint", "hit", "captured", "attacking");
  $("fx-layer").innerHTML = "";

  // 활성 몬스터 검증 (배열 길이 변경 가능성)
  if (state.activeIdx >= state.party.length) {
    state.activeIdx = 0;
  }
  if (state.party.length === 0) { endGame(); return; }

  const commonIds = ALL_MON_IDS.filter(id => MONSTERS[id].rarity !== "legendary");
  const legendaryIds = ALL_MON_IDS.filter(id => MONSTERS[id].rarity === "legendary");

  // 10웨이브마다 보스 출현
  const isBoss = state.wave > 0 && state.wave % 10 === 0;
  let isWildLegendary = false;
  let enemyId;

  if (isBoss && legendaryIds.length > 0) {
    enemyId = pickRandom(legendaryIds);
  } else if (state.wave >= 10 && Math.random() < 0.03 && legendaryIds.length > 0) {
    enemyId = pickRandom(legendaryIds);
    isWildLegendary = true;
  } else {
    enemyId = pickRandom(commonIds);
  }

  state.enemy = makeEnemy(enemyId, state.wave);
  state.isBossWave = isBoss;

  if (isBoss) {
    // 보스 부스트: HP +100%, 공격 +20%
    state.enemy.maxHp = Math.floor(state.enemy.maxHp * 2.0);
    state.enemy.currentHp = state.enemy.maxHp;
    state.enemy.atk = Math.floor(state.enemy.atk * 1.2);
  } else if (isWildLegendary) {
    // 야생 전설 살짝 부스트
    state.enemy.maxHp = Math.floor(state.enemy.maxHp * 1.1);
    state.enemy.currentHp = state.enemy.maxHp;
    state.enemy.atk = Math.floor(state.enemy.atk * 1.1);
  }

  // 새 웨이브 시작 시 교체 쿨다운 리셋
  state.swapCooldown = 0;

  // 웨이브 시작 시 활성 몬스터 회복 (30%)
  if (state.wave > 1) {
    const p = getActive();
    const heal = Math.floor(p.maxHp * 0.3);
    p.currentHp = Math.min(p.maxHp, p.currentHp + heal);
  }

  // 보스 배경 효과 토글
  $("battle-field").classList.toggle("boss-mode", isBoss);

  renderEnemy();
  renderPlayer();
  renderParty();
  updateTopbar();
  hideAllMenus();

  if (isBoss) {
    queueMessage(`⚔️ BOSS BATTLE ⚔️`);
    queueMessage(`보스 ${state.enemy.name}이(가) 강림했다!`);
  } else if (isWildLegendary) {
    queueMessage(`✨ 야생의 전설 ${state.enemy.name}이(가) 나타났다! ✨`);
  } else {
    queueMessage(`야생의 ${state.enemy.name}(이)가 나타났다!`);
  }
  queueAction(() => {
    showActionMenu();
    state.battleLocked = false;
  });
  startMessages();
}

function renderEnemy() {
  $("enemy-img").src = `${IMAGES[state.enemy.id]}`;
  $("enemy-name").textContent = state.enemy.name;
  $("enemy-type").textContent = TYPES[state.enemy.type].name;
  $("enemy-type").className = `type-badge type-${state.enemy.type}`;
  $("enemy-lv").textContent = `Lv ${state.enemy.level}`;
  // 배틀에서 적은 항상 왼쪽(플레이어 방향)을 봐야 함
  // facing=right인 스프라이트는 반전해서 왼쪽으로
  $("enemy-sprite").classList.toggle("flipped", state.enemy.facing === "right");
  // 상태이상 sprite 클래스
  ["burn","paralyze","sleep","poison","fear"].forEach(s => $("enemy-sprite").classList.remove(`status-${s}`));
  if (state.enemy.status) $("enemy-sprite").classList.add(`status-${state.enemy.status}`);
  renderMonStatus("enemy", state.enemy);
  updateHpBar("enemy", state.enemy);
  updateAtkText("enemy", state.enemy);
  updateSpdBadges();
}

function renderPlayer() {
  const p = getActive();
  $("player-img").src = `${IMAGES[p.id]}`;
  $("player-name").textContent = p.name;
  $("player-type").textContent = TYPES[p.type].name;
  $("player-type").className = `type-badge type-${p.type}`;
  $("player-lv").textContent = `Lv ${p.level}`;
  // 배틀에서 플레이어는 항상 오른쪽(적 방향)을 봐야 함
  // facing=left인 스프라이트는 반전해서 오른쪽으로
  $("player-sprite").classList.toggle("flipped", p.facing === "left");
  // 상태이상 sprite 클래스
  ["burn","paralyze","sleep","poison","fear"].forEach(s => $("player-sprite").classList.remove(`status-${s}`));
  if (p.status) $("player-sprite").classList.add(`status-${p.status}`);
  renderMonStatus("player", p);
  updateHpBar("player", p);
  $("player-hp-text").textContent = `${p.currentHp} / ${p.maxHp}`;
  updateAtkText("player", p);
  updateSpdBadges();
}

function updateHpBar(who, mon) {
  const bar = $(`${who}-hp-bar`);
  const pct = (mon.currentHp / mon.maxHp) * 100;
  bar.style.width = `${pct}%`;
  bar.classList.remove("mid", "low");
  if (pct < 25) bar.classList.add("low");
  else if (pct < 50) bar.classList.add("mid");
}

function updateAtkText(who, mon) {
  const el = $(`${who}-atk-text`);
  if (!el) return;
  const base = mon.atk;
  const mult = getStatMultiplier(mon, "atk");
  const current = Math.round(base * mult);
  if (mult > 1.0) {
    el.textContent = `공격력 ${current} (+${Math.round((mult-1)*100)}%)`;
    el.className = "atk-text buffed";
  } else if (mult < 1.0) {
    el.textContent = `공격력 ${current} (-${Math.round((1-mult)*100)}%)`;
    el.className = "atk-text nerfed";
  } else {
    el.textContent = `공격력 ${base}`;
    el.className = "atk-text";
  }
}

function updateSpdBadges() {
  const enemy = state.enemy;
  const player = getActive();
  if (!enemy || !player) return;
  const eSpdMult = getStatMultiplier(enemy, "spd");
  const pSpdMult = getStatMultiplier(player, "spd");
  const eSpd = enemy.spd * eSpdMult;
  const pSpd = player.spd * pSpdMult;
  const eBadge = $("enemy-spd-badge");
  const pBadge = $("player-spd-badge");
  if (!eBadge || !pBadge) return;
  if (eSpd > pSpd) {
    eBadge.classList.add("visible");
    pBadge.classList.remove("visible");
  } else if (pSpd > eSpd) {
    pBadge.classList.add("visible");
    eBadge.classList.remove("visible");
  } else {
    eBadge.classList.remove("visible");
    pBadge.classList.remove("visible");
  }
}

function renderParty() {
  const display = $("party-display");
  display.innerHTML = "";
  for (let i = 0; i < PARTY_MAX; i++) {
    const mon = state.party[i];
    const slot = document.createElement("div");
    slot.className = "party-slot";
    if (!mon) {
      slot.classList.add("empty");
    } else {
      if (i === state.activeIdx) slot.classList.add("active");
      if (mon.currentHp <= 0) slot.classList.add("fainted");
      const hpPct = (mon.currentHp / mon.maxHp) * 100;
      let hpCls = "";
      if (hpPct < 25) hpCls = "low";
      else if (hpPct < 50) hpCls = "mid";
      slot.innerHTML = `
        <img src="${IMAGES[mon.id]}" alt="${mon.name}">
        <div class="party-slot-hp"><div class="party-slot-hp-fill ${hpCls}" style="width:${hpPct}%"></div></div>
      `;
    }
    display.appendChild(slot);
  }
  renderOrbs();
}

function updateTopbar() {
  if ($("stage-display")) $("stage-display").textContent = state.stage;
  // 옛 표시 요소가 남아있으면 갱신 (없으면 무시)
  if ($("wave-display")) $("wave-display").textContent = state.wave;
  if ($("coin-display")) $("coin-display").textContent = state.inventory.coins;
  if ($("gem-display")) $("gem-display").textContent = state.inventory.gems;
  if ($("score-display")) $("score-display").textContent = state.score;
  if ($("potions-badge")) $("potions-badge").textContent = state.inventory.potions;
  renderOrbs();
}

function typeColor(t) { return (TYPES[t] && TYPES[t].color) || "#888"; }

function renderOrbs() {
  // 내 파티 구슬 (총 3칸, 살아있는 수만큼 채움)
  const my = $("my-orbs");
  if (my) {
    let h = "";
    const alive = state.party ? state.party.length : 0;
    for (let i = 0; i < PARTY_MAX; i++) {
      if (i < alive) h += `<span class="orb alive" style="--oc:${typeColor(state.party[i].type)}"></span>`;
      else h += `<span class="orb dead"></span>`;
    }
    my.innerHTML = h;
  }
  // 적 팀 구슬 (쓰러진 적은 흐리게, 현재 적은 강조)
  const en = $("enemy-orbs");
  if (en && state.enemyParty) {
    let h = "";
    state.enemyParty.forEach((e, i) => {
      const dead = e.currentHp <= 0;
      const cur = (i === state.enemyIdx) && !dead;
      h += `<span class="orb ${dead ? 'dead' : 'alive'}${cur ? ' current' : ''}" style="--oc:${typeColor(e.type)}"></span>`;
    });
    en.innerHTML = h;
  }
}

// ===== 메뉴 표시 =====
function hideAllMenus() {
  $("action-grid").classList.add("hidden");
  $("moves-grid").classList.add("hidden");
}

function showActionMenu() {
  hideAllMenus();
  // 스턴 상태면 스킬 못 쓰고 턴 자동 진행
  if (isStunned(getActive())) { stunnedPass(); return; }
  $("action-grid").classList.remove("hidden");
  updateTopbar();

  // 교체 쿨다운 표시 업데이트
  const swapBtn = $("swap-btn");
  const swapBadge = $("swap-cooldown-badge");
  if (state.swapCooldown > 0) {
    swapBadge.textContent = state.swapCooldown;
    swapBadge.style.display = "";
    swapBtn.classList.add("cooldown");
  } else {
    swapBadge.style.display = "none";
    swapBtn.classList.remove("cooldown");
  }

  renderMoves();   // 스킬 4버튼 바로 표시
  setTurnIdle();   // 턴 패널: 내 차례 표시
}

function setPanelSkill(who, move, fallbackName) {
  const icon = $(who + "-skill-icon");
  const name = $(who + "-skill-name");
  if (!icon || !name) return;
  const tag = (who === "my") ? "내 스킬" : "상대 스킬";
  if (move) {
    const ip = move.icon ? `images/${move.icon}` : null;
    icon.innerHTML = ip ? `<img src="${ip}" alt="" onerror="this.parentElement.textContent='⚔️'">` : "⚔️";
    name.innerHTML = `${move.name}<span class="turn-tag">${tag}</span>`;
  } else {
    icon.textContent = (who === "my") ? "⚔️" : "👹";
    const sub = (who === "my") ? "스킬을 선택하세요" : "대기 중";
    name.innerHTML = `${fallbackName}<span class="turn-tag">${sub}</span>`;
  }
}

function setTurnActive(side, moveKey) {
  const mineP = $("panel-mine"), enP = $("panel-enemy");
  if (!mineP || !enP) return;
  const move = MOVES[moveKey];
  if (side === "player") {
    mineP.classList.add("active"); mineP.classList.remove("dim");
    enP.classList.add("dim"); enP.classList.remove("active");
    setPanelSkill("my", move, "내 차례");
  } else {
    enP.classList.add("active"); enP.classList.remove("dim");
    mineP.classList.add("dim"); mineP.classList.remove("active");
    setPanelSkill("enemy", move, state.enemy ? state.enemy.name : "상대");
  }
}

function setTurnIdle() {
  const mineP = $("panel-mine"), enP = $("panel-enemy");
  if (!mineP || !enP) return;
  mineP.classList.add("active"); mineP.classList.remove("dim");
  enP.classList.add("dim"); enP.classList.remove("active");
  setPanelSkill("my", null, "내 차례");
  setPanelSkill("enemy", null, state.enemy ? state.enemy.name : "상대");
}

function renderMoves() {
  const grid = $("moves-grid");
  grid.innerHTML = "";
  const active = getActive();
  active.moves.forEach(moveKey => {
    const move = MOVES[moveKey];
    if (!move) return;
    const btn = document.createElement("button");
    btn.className = "move-btn";

    // 쿨다운/판당1회 체크
    const cd = getCooldown(active, moveKey);
    const usedOnce = move.onceBattle && active.battleUsed && active.battleUsed[moveKey];
    const locked = isMoveLocked(active, moveKey);
    if (cd > 0 || usedOnce) {
      btn.classList.add("cooling");
      btn.dataset.cd = usedOnce ? "✖" : cd;
    }
    if (locked) {
      btn.classList.add("cooling");
      btn.dataset.cd = "🔒";
    }

    // 아이콘
    const iconPath = move.icon ? `images/${move.icon}` : null;
    const iconHtml = iconPath
      ? `<div class="move-btn-icon"><img src="${iconPath}" alt="" onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>⚔️</span>'"></div>`
      : `<div class="move-btn-icon"><span class="placeholder">⚔️</span></div>`;

    // 선제기 뱃지
    const priorityBadge = (move.priority && move.priority > 0)
      ? `<span class="move-btn-priority">선제</span>`
      : '';

    // 메타 (배율/위력 + 쿨다운 또는 판당1회)
    let powerLabel;
    if (move.conditional) {
      powerLabel = "조건부";
    } else if (move.multiplier !== undefined) {
      powerLabel = move.multiplier === 0 ? "보조" : `×${move.multiplier}`;
    } else {
      powerLabel = `위력 ${move.power}`;
    }
    let cdLabel = "";
    if (move.onceBattle) {
      cdLabel = `<span class="move-btn-cd">판당 1회</span>`;
    } else if (move.cooldown && move.cooldown > 0) {
      cdLabel = `<span class="move-btn-cd">쿨 ${move.cooldown}턴</span>`;
    }

    let statusLabel = "";
    if (move.status) {
      const s = STATUS_INFO[move.status.type];
      const pct = Math.round(move.status.chance * 100);
      statusLabel = `<div class="move-status">${s.icon} ${s.name} ${pct}%</div>`;
    }

    btn.innerHTML = `
      ${iconHtml}
      ${priorityBadge}
      <div class="move-btn-name">${move.name}</div>
      ${statusLabel}
      <div class="move-btn-meta">
        <span class="type-badge type-${move.type}">${TYPES[move.type].name}</span>
        <span>${powerLabel}</span>
        ${cdLabel}
      </div>
    `;
    btn.onclick = () => { if (isMoveLocked(active, moveKey)) { flashMessage("봉인된 스킬이다!"); return; } playerAttack(moveKey); };

    // 롱프레스 (500ms) → 상세 모달
    let pressTimer = null;
    let pressed = false;
    const startPress = (e) => {
      pressed = false;
      pressTimer = setTimeout(() => {
        pressed = true;
        if (navigator.vibrate) navigator.vibrate(20);
        openSkillDetail(moveKey);
      }, 500);
    };
    const cancelPress = (e) => {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      // 롱프레스 후 일반 클릭 방지
      if (pressed) {
        e.preventDefault();
        e.stopPropagation();
        pressed = false;
        // onclick도 안 실행되게 잠시 비활성화
        const orig = btn.onclick;
        btn.onclick = null;
        setTimeout(() => { btn.onclick = orig; }, 100);
      }
    };
    btn.addEventListener("touchstart", startPress, { passive: true });
    btn.addEventListener("touchend",   cancelPress);
    btn.addEventListener("touchmove",  () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
    btn.addEventListener("mousedown",  startPress);
    btn.addEventListener("mouseup",    cancelPress);
    btn.addEventListener("mouseleave", () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
    btn.addEventListener("contextmenu", (e) => { e.preventDefault(); openSkillDetail(moveKey); });

    grid.appendChild(btn);
  });
  grid.classList.remove("hidden");
}

// ===== 배틀 진행 =====
// 스턴 상태로 플레이어가 턴을 넘김
async function stunnedPass() {
  await showMessage(`💫 ${getActive().name}은(는) 스턴 상태! 움직일 수 없다!`, 900);
  await playerAttack(null);
}

async function playerAttack(moveKey) {
  if (state.battleLocked) return;
  const player = getActive();
  const stunnedTurn = (moveKey === null); // 스턴으로 인한 빈 턴
  // 쿨다운 체크 (이미 UI에서도 막지만 안전망)
  if (!stunnedTurn && !isMoveAvailable(player, moveKey)) {
    await showMessage("아직 사용할 수 없다!", 600);
    return;
  }
  state.battleLocked = true;
  hideAllMenus();

  // 적의 스킬은 chooseEnemyMove에서 결정. 미리 알아야 선제기 판정 가능
  const enemyMoveKey = chooseEnemyMove(state.enemy, player);
  // 선제기/속도 기반 선공 판정
  const firstSide = decideFirstAttacker(moveKey, enemyMoveKey, player, state.enemy);
  const playerFirst = (firstSide === "player");

  // 행동 시도 (상태이상으로 못할 수도)
  async function tryAttack(attacker, defender, attackerSide, defenderSide, mKey) {
    setTurnActive(attackerSide, mKey);   // 턴 패널: 행동하는 쪽 강조 + 스킬 표시
    // 스턴 처리 (스킬 사용 불가)
    if (isStunned(attacker)) {
      const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
      await showMessage(`💫 ${label}은(는) 스턴 상태라 움직일 수 없다!`, 800);
      return "blocked";
    }
    // 잠 처리
    if (attacker.status === "sleep") {
      if (attacker.sleepTurns > 0) {
        const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
        await showMessage(`${label}은(는) 잠들어 있다! (${attacker.sleepTurns}턴 남음)`, 700);
        attacker.sleepTurns -= 1;
        if (attacker.sleepTurns <= 0) {
          attacker.status = null;
          renderMonStatus(attackerSide, attacker);
          await showMessage(`${label}은(는) 잠에서 깨어났다!`, 700);
        }
        return "blocked";
      }
    }
    // 마비 25% 행동 불가
    if (attacker.status === "paralyze" && Math.random() < 0.25) {
      const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
      await showMessage(`${label}은(는) 마비되어 움직일 수 없다!`, 700);
      return "blocked";
    }
    await executeAttack(attacker, defender, attackerSide, defenderSide, mKey);
    return "ok";
  }

  if (stunnedTurn) {
    // 플레이어 스턴: 적만 행동
    await tryAttack(state.enemy, player, "enemy", "player", enemyMoveKey);
    if (player.currentHp <= 0 && !(await tryPhoenixRevive(player, "player"))) { await handlePlayerFaint(); return; }
  } else if (playerFirst) {
    await tryAttack(player, state.enemy, "player", "enemy", moveKey);
    if (state.enemy.currentHp <= 0 && !(await tryPhoenixRevive(state.enemy, "enemy"))) { tickCooldowns(player); await handleEnemyFaint(); return; }
    await tryAttack(state.enemy, player, "enemy", "player", enemyMoveKey);
    if (player.currentHp <= 0 && !(await tryPhoenixRevive(player, "player"))) { await handlePlayerFaint(); return; }
  } else {
    await tryAttack(state.enemy, player, "enemy", "player", enemyMoveKey);
    if (player.currentHp <= 0 && !(await tryPhoenixRevive(player, "player"))) { await handlePlayerFaint(); return; }
    await tryAttack(player, state.enemy, "player", "enemy", moveKey);
    if (state.enemy.currentHp <= 0 && !(await tryPhoenixRevive(state.enemy, "enemy"))) { tickCooldowns(player); await handleEnemyFaint(); return; }
  }

  // 턴 끝: 화상/독 데미지 (양쪽 다 체크)
  await applyEndTurnStatus(player, "player");
  if (player.currentHp <= 0 && !(await tryPhoenixRevive(player, "player"))) { await handlePlayerFaint(); return; }
  await applyEndTurnStatus(state.enemy, "enemy");
  if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }

  // 턴 끝: 패시브 효과
  await applyEndTurnPassives(player, "player");
  if (player.currentHp <= 0) { await handlePlayerFaint(); return; }
  if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }
  await applyEndTurnPassives(state.enemy, "enemy");
  if (player.currentHp <= 0) { await handlePlayerFaint(); return; }
  if (state.enemy.currentHp <= 0) { await handleEnemyFaint(); return; }

  // 교체 쿨다운 감소
  if (state.swapCooldown > 0) state.swapCooldown -= 1;

  state.battleLocked = false;
  showActionMenu();
}

// 턴 끝 패시브 효과
async function applyEndTurnPassives(mon, side) {
  if (!mon || mon.currentHp <= 0) return;

  // === 새 effects 턴 처리 (2단계) ===
  // 지속피해 적용 + 지속시간 감소 + 만료 제거
  const tickMsgs = tickEffects(mon);
  if (tickMsgs.length > 0) {
    updateHpBar(side, mon);
    if (side === "player") {
      $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
      renderParty();
    }
    for (const m of tickMsgs) {
      await showMessage(m, 500);
      if (mon.currentHp <= 0) return;  // 도트로 죽으면 종료
    }
    renderMonStatus(side, mon);  // 만료 효과 사라진 거 표시
  }
  // 쿨다운 -1
  tickCooldowns(mon);

  // 청룡: 매턴 HP 회복 (일반 12% / 보스 6%)
  if (mon.passive === "azure_blessing" && mon.currentHp < mon.maxHp) {
    const isBossEnemy = (side === "enemy" && state.isBossWave);
    const healPct = isBossEnemy ? 0.06 : 0.12;
    const heal = Math.floor(mon.maxHp * healPct);
    const before = mon.currentHp;
    mon.currentHp = Math.min(mon.maxHp, mon.currentHp + heal);
    const actual = mon.currentHp - before;
    if (actual > 0) {
      popHeal(side, actual);
      updateHpBar(side, mon);
      if (side === "player") {
        $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
        renderParty();
      }
      await showMessage(`💧 ${mon.name}의 수룡의 가호! HP 회복`, 500);
    }
  }

  // 별정령: 매턴 적 최대HP 데미지 (일반 5% / 보스 3%)
  if (mon.passive === "stars_grace") {
    const target = (side === "player") ? state.enemy : getActive();
    const targetSide = (side === "player") ? "enemy" : "player";
    if (target && target.currentHp > 0) {
      const isBossEnemy = (side === "enemy" && state.isBossWave);
      const dmgPct = isBossEnemy ? 0.03 : 0.05;
      const dmg = Math.max(1, Math.floor(target.maxHp * dmgPct));
      target.currentHp = Math.max(0, target.currentHp - dmg);
      popDamage(targetSide, dmg, false, 1, `-${dmg}`);
      updateHpBar(targetSide, target);
      if (targetSide === "player") {
        $("player-hp-text").textContent = `${target.currentHp} / ${target.maxHp}`;
        renderParty();
      }
      await showMessage(`⭐ ${mon.name}의 별의 가호 자동공격!`, 500);
    }
  }

  // 꽃늑대: 후방 팀원 매턴 10% 회복 (플레이어 측에서만)
  if (mon.passive === "natures_blessing" && side === "player") {
    let healedAny = false;
    state.party.forEach((m, i) => {
      if (i === state.activeIdx) return;  // 활성 멤버 제외
      if (!m || m.currentHp <= 0 || m.currentHp >= m.maxHp) return;
      const heal = Math.floor(m.maxHp * 0.10);
      m.currentHp = Math.min(m.maxHp, m.currentHp + heal);
      healedAny = true;
    });
    if (healedAny) {
      renderParty();
      await showMessage(`🌿 ${mon.name}의 자연의 축복! 후방 팀원 회복`, 500);
    }
  }
}

// 턴 종료 시 화상/독 데미지
async function applyEndTurnStatus(mon, side) {
  if (mon.status === "burn") {
    const dmg = Math.max(1, Math.floor(mon.maxHp / 16));
    mon.currentHp = Math.max(0, mon.currentHp - dmg);
    const label = (side === "player") ? mon.name : `야생의 ${mon.name}`;
    await showMessage(`🔥 ${label}은(는) 화상 데미지!`, 600);
    popDamage(side, dmg, false, 1, `-${dmg}`);
    updateHpBar(side, mon);
    if (side === "player") {
      $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
      renderParty();
    }
    await sleep(400);
  } else if (mon.status === "poison") {
    const dmg = Math.max(1, Math.floor(mon.maxHp / 8));
    mon.currentHp = Math.max(0, mon.currentHp - dmg);
    const label = (side === "player") ? mon.name : `야생의 ${mon.name}`;
    await showMessage(`☠️ ${label}은(는) 독 데미지!`, 600);
    popDamage(side, dmg, false, 1, `-${dmg}`);
    updateHpBar(side, mon);
    if (side === "player") {
      $("player-hp-text").textContent = `${mon.currentHp} / ${mon.maxHp}`;
      renderParty();
    }
    await sleep(400);
  }
}

async function executeAttack(attacker, defender, attackerSide, defenderSide, moveKey) {
  const r = calcDamage(attacker, defender, moveKey);
  const label = (attackerSide === "player") ? attacker.name : `야생의 ${attacker.name}`;
  await showMessage(`${label}의 ${r.move.name}!`, 500);

  // 암흑 상태: 공격기(데미지 있는 스킬)는 100% 빗나감. 회복/버프기(multiplier 0)는 정상.
  const isAttackMove = (r.move.multiplier === undefined) ? (r.move.power > 0) : (r.move.multiplier > 0);
  if (isAttackMove && attacker.activeEffects && attacker.activeEffects.some(e => e.kind === "blind")) {
    const attSp = $(`${attackerSide}-sprite`);
    attSp.classList.add("attacking");
    if (attackerSide === "enemy") attSp.classList.add("enemy-attacker");
    await sleep(200);
    attSp.classList.remove("attacking", "enemy-attacker");
    await showMessage(`🌑 ${label}의 공격이 빗나갔다! (암흑)`, 900);
    setCooldown(attacker, moveKey);
    return;
  }

  const attSprite = $(`${attackerSide}-sprite`);
  const defSprite = $(`${defenderSide}-sprite`);

  attSprite.classList.add("attacking");
  if (attackerSide === "enemy") attSprite.classList.add("enemy-attacker");
  await sleep(150);

  await playSkillEffect(moveKey, r.move.type, attackerSide, defenderSide);

  attSprite.classList.remove("attacking", "enemy-attacker");

  // 데미지 처리 (위력 0 기술은 데미지 없음)
  if (r.damage > 0) {
    $("battle-flash").classList.remove("flash-hit");
    void $("battle-flash").offsetWidth;
    $("battle-flash").classList.add("flash-hit");

    $("battle-field").classList.remove("shake");
    void $("battle-field").offsetWidth;
    $("battle-field").classList.add("shake");

    defSprite.classList.add("hit");
    popDamage(defenderSide, r.damage, r.isCrit, r.typeMult);

    defender.currentHp = Math.max(0, defender.currentHp - r.damage);
    updateHpBar(defenderSide, defender);
    if (defenderSide === "player") {
      $("player-hp-text").textContent = `${defender.currentHp} / ${defender.maxHp}`;
      renderParty();
    }

    // 흡혈(lifesteal): 시전자가 흡혈 상태면 입힌 피해의 X% 회복
    if (attacker.activeEffects) {
      const ls = attacker.activeEffects.find(e => e.kind === "lifesteal");
      if (ls && attacker.currentHp > 0) {
        const drain = Math.floor(r.damage * ls.value / 100);
        if (drain > 0) {
          attacker.currentHp = Math.min(attacker.maxHp, attacker.currentHp + drain);
          popHeal(attackerSide, drain);
          updateHpBar(attackerSide, attacker);
          if (attackerSide === "player") {
            $("player-hp-text").textContent = `${attacker.currentHp} / ${attacker.maxHp}`;
            renderParty();
          }
        }
      }
    }

    await sleep(450);
    defSprite.classList.remove("hit");
    $("battle-field").classList.remove("shake");
    $("battle-flash").classList.remove("flash-hit");
  } else {
    // 위력 0 기술 (수면포자 등) — 짧은 효과만
    await sleep(300);
  }

  if (r.isCrit) await showMessage("급소에 맞았다!", 500);
  if (r.typeMult > 1) await showMessage("효과가 굉장했다!", 500);
  else if (r.typeMult > 0 && r.typeMult < 1) await showMessage("효과가 별로인 듯하다...", 500);

  // 꽃늑대 패시브: 모든 상태이상 면역
  const defenderImmune = defender.passive === "natures_blessing";

  // 일반 기술의 상태이상 적용
  if (r.move.status && defender.currentHp > 0 && !defender.status && !defenderImmune) {
    if (Math.random() < r.move.status.chance) {
      await applyStatus(defender, defenderSide, r.move.status.type);
    }
  }

  // 흑룡 패시브: 공격받을 때 공포 부여 (일반 30% / 보스 15%)
  if (defender.passive === "dark_reign" && r.damage > 0 && attacker.currentHp > 0
      && !attacker.status && attacker.passive !== "natures_blessing") {
    const isBossDefender = (defenderSide === "enemy" && state.isBossWave);
    const fearChance = isBossDefender ? 0.15 : 0.30;
    if (Math.random() < fearChance) {
      await applyStatus(attacker, attackerSide, "fear");
    }
  }

  // === 새 effects 시스템 (2단계) ===
  // 스킬에 effects 배열이 있으면 적용. 기존 스킬은 영향 없음.
  if (r.move.effects && r.move.effects.length > 0) {
    const msgs = applyEffects(r.move.effects, attacker, defender, moveKey);
    renderMonStatus(attackerSide, attacker);
    renderMonStatus(defenderSide, defender);
    updateAtkText(attackerSide, attacker);
    updateAtkText(defenderSide, defender);
    updateSpdBadges();
    if (attackerSide === "player") {
      updateHpBar("player", attacker);
      $("player-hp-text").textContent = `${attacker.currentHp} / ${attacker.maxHp}`;
      renderParty();
    } else {
      updateHpBar("enemy", attacker);
    }
    for (const m of msgs) await showMessage(m, 500);
  }
  // 쿨다운 등록 (새 시스템)
  setCooldown(attacker, moveKey);

  // === 전기 전류 시스템 ===
  // 전기 타입 스킬에 맞으면 상대에게 전류 1p 누적, 3p 도달 시 자해딜 + 속도감소
  if (r.move.type === "electric" && defender.currentHp > 0) {
    defender.charge = (defender.charge || 0) + 1;
    renderMonStatus(defenderSide, defender);
    if (defender.charge >= 3) {
      defender.charge = 0;
      const overDmg = Math.max(1, Math.floor(defender.atk * 0.5));
      defender.currentHp = Math.max(0, defender.currentHp - overDmg);
      popDamage(defenderSide, overDmg, false, 1, `-${overDmg}`);
      updateHpBar(defenderSide, defender);
      if (defenderSide === "player") {
        $("player-hp-text").textContent = `${defender.currentHp} / ${defender.maxHp}`;
        renderParty();
      }
      // 속도 -30% 2턴
      applyEffects([{ kind: "spd_down", target: "self", value: 30, duration: 2 }], defender, defender, "charge_burst");
      renderMonStatus(defenderSide, defender);
      updateSpdBadges();
      await showMessage(`⚡ 전류 과부하 폭발! ${defender.name}이(가) 감전됐다!`, 900);
    }
  }

  // === 파멸의 기운(doom_aura): 스킬 쓸 때마다 50% 확률로 상대에게 공포 ===
  if (attacker.activeEffects && attacker.activeEffects.some(e => e.kind === "doom_aura")
      && defender.currentHp > 0 && Math.random() < 0.50) {
    applyEffects([{ kind: "fear", target: "self", value: 0, duration: 2 }], defender, defender, "doom_aura");
    renderMonStatus(defenderSide, defender);
    await showMessage(`👑 파멸의 기운! ${defender.name}이(가) 공포에 휩싸였다!`, 800);
  }
}

// 상태이상 적용
async function applyStatus(mon, side, statusType) {
  mon.status = statusType;
  if (statusType === "sleep") {
    mon.sleepTurns = 1 + Math.floor(Math.random() * 3);  // 1~3턴
  }
  const info = STATUS_INFO[statusType];
  const label = (side === "player") ? mon.name : `야생의 ${mon.name}`;
  await showMessage(`${info.icon} ${label}은(는) ${info.name} 상태가 되었다!`, 800);
  renderMonStatus(side, mon);
  if (side === "player") renderParty();
}

// 상태이상 아이콘 + 패시브 표시
function renderMonStatus(side, mon) {
  const wrap = $(`${side}-status`);
  if (!wrap) return;
  let html = "";
  // 패시브 (전설 표시)
  if (mon.passive && PASSIVE_INFO[mon.passive]) {
    html += `<span class="passive-pill" title="${PASSIVE_INFO[mon.passive].desc}">★ ${PASSIVE_INFO[mon.passive].name}</span>`;
  }
  // 상태이상
  if (mon.status) {
    const info = STATUS_INFO[mon.status];
    html += `<span class="status-pill" style="background:${info.color}">${info.icon} ${info.name}</span>`;
  }
  // 활성 효과 (버프/디버프) - 2단계 (공격력 증감은 atk-text에 표시하므로 제외)
  if (mon.activeEffects && mon.activeEffects.length > 0) {
    mon.activeEffects.forEach(e => {
      if (e.kind === "atk_up" || e.kind === "atk_down") return;
      const def = EFFECT_DEFS[e.kind];
      if (!def) return;
      const sign = def.sign > 0 ? "▲" : (def.sign < 0 ? "▼" : "");
      html += `<span class="effect-pill" style="border-color:${def.color}" title="${def.label} (${e.duration}턴)">${def.icon}${sign}<span class="effect-turns">${e.duration}</span></span>`;
    });
  }
  // 전류 스택 (전기 시스템)
  if (mon.charge && mon.charge > 0) {
    html += `<span class="effect-pill" style="border-color:#ffeb3b" title="전류 ${mon.charge}/3">⚡<span class="effect-turns">${mon.charge}</span></span>`;
  }
  wrap.innerHTML = html;
  wrap.classList.toggle("active", !!(mon.passive || mon.status || mon.charge || (mon.activeEffects && mon.activeEffects.length)));
}

// ===== 스킬별 고유 이펙트 =====
function shakeScreen() {
  const f = $("battle-field");
  f.classList.remove("shaking");
  void f.offsetWidth;
  f.classList.add("shaking");
  setTimeout(() => f.classList.remove("shaking"), 450);
}
function mkEl(tag, css, parent) {
  const el = document.createElement(tag || "div");
  el.className = "fx-el";
  Object.assign(el.style, css || {});
  (parent || $("fx-layer")).appendChild(el);
  return el;
}
function pos(el, x, y) { el.style.left = x + "px"; el.style.top = y + "px"; }
function autoRemove(el, ms) { setTimeout(() => el.remove(), ms); }

async function playSkillEffect(moveKey, moveType, attackerSide, defenderSide) {
  const field = $("battle-field");
  const fxLayer = $("fx-layer");
  const fieldRect = field.getBoundingClientRect();
  const attRect = $(`${attackerSide}-sprite`).getBoundingClientRect();
  const defRect = $(`${defenderSide}-sprite`).getBoundingClientRect();
  const ax = attRect.left + attRect.width/2 - fieldRect.left;
  const ay = attRect.top  + attRect.height/2 - fieldRect.top;
  const dx = defRect.left + defRect.width/2  - fieldRect.left;
  const dy = defRect.top  + defRect.height/2 - fieldRect.top;

  // ── 헬퍼: 발사체 이동 ──
  async function flyProj(el, duration=380) {
    el.style.transition = `left ${duration}ms cubic-bezier(0.3,0,0.7,1), top ${duration}ms cubic-bezier(0.3,0,0.7,1)`;
    await sleep(20);
    pos(el, dx, dy);
    await sleep(duration);
  }

  // ── 헬퍼: 슬래시 라인 ──
  function mkSlash(x, y, color, w, rot, animName, dur) {
    const el = mkEl("div", { width: w+"px", height:"6px",
      background:`linear-gradient(90deg,transparent 0%,${color} 40%,#fff 60%,transparent 100%)`,
      borderRadius:"3px", filter:`drop-shadow(0 0 6px ${color})`,
      animation:`${animName} ${dur}ms forwards` });
    pos(el, x, y);
    autoRemove(el, dur);
    return el;
  }

  switch(moveKey) {

    // ════════ 불 타입 ════════

    case "blaze_fang": {
      mkSlash(dx, dy, "#ff6a00", 110, -40, "slash-sw", 420);
      await sleep(300);
      break;
    }

    case "flame_punch": {
      // 불 주먹 - 발사체 이동 후 펀치 폭발
      const fist = mkEl("div", { width:"44px", height:"44px",
        background:"radial-gradient(circle at 40% 40%, #fff3a0 0%, #ff8c00 40%, #ff3d00 70%, transparent 85%)",
        borderRadius:"30% 50% 40% 50%", filter:"drop-shadow(0 0 12px #ff8c00)",
        animation:"fire-pulse 0.15s ease infinite" });
      pos(fist, ax, ay);
      await flyProj(fist, 280);
      fist.remove();
      const punch = mkEl("div", { width:"80px", height:"80px",
        background:"radial-gradient(circle, #fff5a0 0%, #ff7c00 35%, #ff3d00 60%, transparent 78%)",
        borderRadius:"50%", filter:"drop-shadow(0 0 16px #ff8c00)",
        animation:"fist-hit 0.45s forwards" });
      pos(punch, dx, dy);
      autoRemove(punch, 450);
      await sleep(380);
      break;
    }

    case "heat_wave": {
      // 불 회오리 + 화면 흔들림
      for (let i = 0; i < 3; i++) {
        const w = mkEl("div", { width:"70px", height:"70px",
          background:`conic-gradient(from ${i*120}deg, #ff3d00, #ff9800, #ff3d00 60%, transparent)`,
          borderRadius:"50%", filter:"drop-shadow(0 0 14px #ff5722)",
          animation:"whirl 0.7s forwards", opacity:"0" });
        pos(w, dx + (i-1)*18, dy + (i-1)*12);
        autoRemove(w, 700);
        await sleep(80);
      }
      shakeScreen();
      await sleep(650);
      break;
    }

    case "meteor_flare": {
      // 메테오 3번 낙하
      shakeScreen();
      for (let i = 0; i < 3; i++) {
        const ox = (i-1)*28;
        const meteor = mkEl("div", { width:"46px", height:"46px",
          background:"radial-gradient(circle at 35% 35%, #fff3a0 0%, #ff8a3d 35%, #ff3d00 65%, transparent 80%)",
          borderRadius:"50% 40% 50% 30%", filter:"drop-shadow(0 0 14px #ff6a00)",
          animation:"meteor-fall 0.38s forwards" });
        pos(meteor, dx+ox, dy);
        await sleep(20);
        autoRemove(meteor, 380);
        await sleep(160);
        const imp = mkEl("div", { width:"90px", height:"90px",
          background:"radial-gradient(circle, #fff3a0 0%, #ff6a00 40%, transparent 70%)",
          borderRadius:"50%", filter:"drop-shadow(0 0 18px #ff6a00)",
          animation:"meteor-impact 0.5s forwards" });
        pos(imp, dx+ox, dy);
        autoRemove(imp, 500);
        await sleep(180);
      }
      shakeScreen();
      await sleep(200);
      break;
    }

    case "burning_claw": {
      // 슬래시 3줄 (발톱)
      [-18, 0, 18].forEach((off, i) => {
        const anims = ["slash-claw1","slash-claw2","slash-claw3"];
        const el = mkEl("div", { width:"100px", height:"5px",
          background:`linear-gradient(90deg,transparent,#ff6a00,#fff,transparent)`,
          borderRadius:"3px", filter:"drop-shadow(0 0 5px #ff6a00)",
          animation:`${anims[i]} 0.42s forwards` });
        pos(el, dx, dy+off);
        autoRemove(el, 450);
      });
      await sleep(320);
      break;
    }

    case "inferno": {
      // 불 브레스 빔 - 대각으로 ax,ay → dx,dy
      const bDist = Math.hypot(dx-ax, dy-ay);
      const bAngle = Math.atan2(dy-ay, dx-ax) * 180 / Math.PI;
      const beam = document.createElement("div");
      beam.style.cssText = `
        position:absolute; z-index:5; pointer-events:none;
        height:20px; width:0px;
        background:linear-gradient(90deg,#ff3d00,#ffab40,#fff3a0,#ffab40,#ff3d00);
        border-radius:10px;
        filter:drop-shadow(0 0 10px #ff5722) drop-shadow(0 0 20px #ff9800);
        transform-origin:left center;
        left:${ax}px; top:${ay-10}px;
        transform:rotate(${bAngle}deg);
        transition:width 0.42s cubic-bezier(0.1,0,0.4,1), opacity 0.3s;
      `;
      fxLayer.appendChild(beam);
      await sleep(20);
      beam.style.width = bDist + "px";
      await sleep(430);
      beam.style.opacity = "0";
      autoRemove(beam, 300);
      await sleep(380);
      break;
    }

    case "nightmare": {

        border-radius:60% 40% 50% 50% / 55% 60% 40% 50%;

      } else {

}

function popDamage(side, dmg, isCrit, typeMult, label) {
  const sprite = $(`${side}-sprite`);
  const pop = document.createElement("div");
  pop.className = "damage-pop";
  if (isCrit) pop.classList.add("crit");
  if (typeMult > 0 && typeMult < 1) pop.classList.add("weak");
  pop.textContent = label || `-${dmg}`;
  sprite.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

function popHeal(side, amount) {
  const sprite = $(`${side}-sprite`);
  const pop = document.createElement("div");
  pop.className = "damage-pop heal";
  pop.textContent = `+${amount}`;
  sprite.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

// ===== 잡기 시각 효과 =====

// 적 위치 가져오기 (fxLayer 기준)
function getEnemyCenter() {
  const field = $("battle-field").getBoundingClientRect();
  const sprite = $("enemy-sprite").getBoundingClientRect();
  return {
    x: sprite.left + sprite.width / 2 - field.left,
    y: sprite.top + sprite.height / 2 - field.top
  };
}

// 잡기도구 던지기 (적 위치에 등장)

async function handleEnemyFaint() {
  // 적 봉황 패시브: 부활 (적은 쿨다운 무시, 한 배틀당 1회만 / 보스는 25%)
  if (state.enemy.passive === "phoenix_rebirth" && state.enemy.phoenixUsedWave === -10) {
    const revivePct = state.isBossWave ? 0.25 : 0.50;
    state.enemy.currentHp = Math.floor(state.enemy.maxHp * revivePct);
    state.enemy.status = null;
    state.enemy.sleepTurns = 0;
    state.enemy.phoenixUsedWave = state.wave;
    ["burn","paralyze","sleep","poison","fear"].forEach(s => $("enemy-sprite").classList.remove(`status-${s}`));
    await showMessage(`🔥 ${state.enemy.name}이(가) 불꽃 속에서 부활했다!`, 1200);
    renderEnemy();
    state.battleLocked = false;
    showActionMenu();
    return;
  }

  $("enemy-sprite").classList.add("faint");
  const wasBoss = state.isBossWave;
  const fallenEnemy = state.enemy;
  const fallenName = state.enemy.name;

  // === 사망 트리거: 플레이어가 onEnemyDeath 효과 보유 시 (전장의 개화) ===
  const pActive = getActive();
  if (pActive && pActive.activeEffects) {
    const trigger = pActive.activeEffects.find(e => e.onEnemyDeath === "full_heal");
    if (trigger) {
      pActive.currentHp = pActive.maxHp;
      await showMessage(`🌸 ${pActive.name}이(가) 전장의 꽃으로 완전 회복했다!`, 1100);
      renderPlayer();
      renderParty();
    }
  }
  // untilDeath trapped 효과 해제 (적이 죽었으므로)
  if (pActive && pActive.activeEffects) {
    pActive.activeEffects = pActive.activeEffects.filter(e => !e.untilDeath);
  }

  if (wasBoss) {
    await showMessage(`⚔️ 보스 ${fallenName}(이)가 쓰러졌다! ⚔️`, 1200);
  } else {
    await showMessage(`야생의 ${fallenName}(이)가 쓰러졌다!`, 900);
  }

  // 코인 (보스는 3배)
  let coinGain = 15 + state.wave * 5;
  if (wasBoss) coinGain *= 3;
  state.inventory.coins += coinGain;
  state.kills += 1;
  const scoreGain = (50 + state.wave * 10) * (wasBoss ? 3 : 1);
  state.score += scoreGain;

  await showMessage(`+${coinGain} 코인 · +${scoreGain} 점수`, 800);

  updateTopbar();

  state.isBossWave = false;
  $("battle-field").classList.remove("boss-mode");

  // 다음 적이 남아있으면 등장, 모두 쓰러졌으면 스테이지 클리어
  const nextIdx = state.enemyIdx + 1;
  if (nextIdx < state.enemyParty.length) {
    activateEnemy(nextIdx);
    renderParty();
    await showMessage(`다음 적, ${state.enemy.name}!`, 1000);
    state.battleLocked = false;
    showActionMenu();
  } else {
    await stageClear();
  }
}

async function stageClear() {
  state.battleLocked = true;
  hideAllMenus();
  await showMessage(`🎉 스테이지 클리어!`, 1500);
  // (스테이지맵 연동 시 해금/보상 처리 예정)
  renderLobby();
  showScreen("lobby-screen");
}

// 보스 처치 후 자동 잡기 (5번, 40% 확률)

async function handlePlayerFaint() {
  const fallen = getActive();

  // 봉황 패시브: 부활 (5웨이브 쿨다운)
  if (fallen.passive === "phoenix_rebirth"
      && state.wave - fallen.phoenixUsedWave >= 5) {
    fallen.currentHp = Math.floor(fallen.maxHp * 0.5);
    fallen.status = null;
    fallen.sleepTurns = 0;
    fallen.phoenixUsedWave = state.wave;
    ["burn","paralyze","sleep","poison","fear"].forEach(s => $("player-sprite").classList.remove(`status-${s}`));
    await showMessage(`🔥 ${fallen.name}이(가) 불꽃 속에서 부활했다!`, 1200);
    renderPlayer();
    renderParty();
    state.battleLocked = false;
    showActionMenu();
    return;
  }

  $("player-sprite").classList.add("faint");
  await showMessage(`${fallen.name}(이)가 쓰러졌다...`, 1200);

  // === 사망 트리거: onSelfDeath (월화난무) ===
  if (fallen.activeEffects) {
    const trigger = fallen.activeEffects.find(e => e.onSelfDeath === "moonflower_blessing");
    if (trigger) {
      // 남은 아군 전체에게 5턴간 최대체력+800, 공격력+50
      state.party.forEach(m => {
        if (m !== fallen && m.currentHp > 0) {
          m.maxHp += 800;
          m.currentHp += 800;
          m.atk += 50;
          if (!m.activeEffects) m.activeEffects = [];
          m.activeEffects.push({ kind: "atk_up", value: 0, duration: 5, sourceMove: "moonflower_blessing", _blessing: true });
        }
      });
      await showMessage(`🌙 월화랑의 마지막 축복! 아군이 강해졌다!`, 1300);
    }
  }
  // untilDeath trapped 효과를 가진 적도 해제 (월화랑이 죽었으므로)
  if (state.enemy && state.enemy.activeEffects) {
    state.enemy.activeEffects = state.enemy.activeEffects.filter(e => !e.untilDeath);
  }

  // 죽은 몬스터를 파티에서 제거
  const fallenIdx = state.activeIdx;
  state.party.splice(fallenIdx, 1);

  // 살아있는 몬스터 있는지 확인
  if (state.party.length === 0) {
    endGame();
    return;
  }

  // 활성 인덱스 갱신 (앞 인덱스 제거로 뒤가 당겨졌으면 0번으로)
  // 단, 배열이 1개만 남았으면 자동으로 0
  state.activeIdx = 0;

  // 한 마리만 남았으면 자동 전투 진행
  if (state.party.length === 1) {
    $("player-sprite").classList.remove("faint");
    renderPlayer();
    renderParty();
    await showMessage(`${getActive().name}, 가라!`, 700);
    state.battleLocked = false;
    showActionMenu();
    return;
  }

  // 2마리 이상 있으면 강제 교체 메뉴
  renderParty();
  await showMessage("다음 몬스터를 선택하세요!", 700);
  showPartyMenu(true);  // forced=true
}

// ===== 교체 시스템 =====
function showPartyMenu(forced = false) {
  if (state.battleLocked && !forced) return;
  // 쿨다운 체크 (강제 교체는 무시)
  if (!forced && state.swapCooldown > 0) {
    flashMessage(`교체 쿨타임! ${state.swapCooldown}턴 남음`);
    return;
  }
  state.swapForced = forced;
  $("swap-tray-title").textContent = forced ? "강제 교체 — 다음 몬스터를 골라!" : "파티 교체";
  const list = $("swap-tray-list");
  let html = "";
  state.party.forEach((mon, i) => {
    const isActive = i === state.activeIdx;
    const isFainted = mon.currentHp <= 0;
    const disabled = isActive || isFainted;
    const hpPct = Math.max(0, (mon.currentHp / mon.maxHp) * 100);
    let hpCls = "";
    if (hpPct < 25) hpCls = "low";
    else if (hpPct < 50) hpCls = "mid";
    let tag = "";
    if (isActive) tag = `<span class="sc-tag active">전투중</span>`;
    else if (isFainted) tag = `<span class="sc-tag fainted">쓰러짐</span>`;
    html += `
      <div class="swap-card rarity-${mon.rarity || 'common'} ${disabled ? 'disabled' : ''}"
           style="--type:${TYPE_RGB[mon.type] || '141,151,166'}"
           ${disabled ? '' : `onclick="swapTo(${i}, ${forced})"`}>
        <div class="sc-inner">
          <div class="sc-corner"><span>${TYPES[mon.type].name}</span></div>
          ${tag}
          <div class="sc-art"><img src="${IMAGES[mon.id]}" alt="${mon.name}"></div>
          <div class="sc-name">${mon.name}</div>
          <div class="sc-hp"><div class="fill ${hpCls}" style="width:${hpPct}%"></div></div>
          <div class="sc-meta">${mon.currentHp}/${mon.maxHp}</div>
        </div>
      </div>
    `;
  });
  list.innerHTML = html;
  $("swap-tray-cancel").classList.toggle("hidden", forced);
  $("swap-tray-bg").classList.add("show");
}

function closeSwapTray() {
  if (state.swapForced) return;   // 강제 교체 중엔 닫기 불가
  $("swap-tray-bg").classList.remove("show");
}

async function swapTo(idx, forced) {
  state.swapForced = false;
  $("swap-tray-bg").classList.remove("show");
  const prev = getActive();
  // 교체불가 체크 (강제 교체는 제외, 즉 사망 시는 OK)
  if (!forced && prev && prev.activeEffects && prev.activeEffects.some(e => e.kind === "trapped")) {
    await showMessage(`${prev.name}은(는) 교체할 수 없다!`, 900);
    state.battleLocked = false;
    return;
  }
  if (prev) clearEffects(prev);
  state.activeIdx = idx;
  // 이전 sprite의 faint/hit/attacking 클래스 제거
  $("player-sprite").classList.remove("faint", "hit", "attacking");

  // 별정령 패시브: 교체되어 나왔을 때 첫 공격 부스트 활성화
  const newActive = getActive();
  if (newActive.passive === "stars_grace") {
    newActive.starGraceBoost = true;
  }

  renderPlayer();
  renderParty();
  await showMessage(`${getActive().name}, 가라!`, 700);

  if (forced) {
    // 강제 교체 - 적의 턴 안 거치고 바로 행동, 쿨다운 X
    state.battleLocked = false;
    showActionMenu();
  } else {
    // 일반 교체 - 쿨다운 2턴 설정 + 적이 한 턴 공격
    state.swapCooldown = 2;
    state.battleLocked = true;
    hideAllMenus();
    await executeAttack(state.enemy, getActive(), "enemy", "player", pickRandom(state.enemy.moves));
    if (getActive().currentHp <= 0) { await handlePlayerFaint(); return; }
    state.battleLocked = false;
    showActionMenu();
  }
}

function usePotionBattle() {
  if (state.battleLocked) return;
  const p = getActive();
  if (state.inventory.potions <= 0) { flashMessage("회복약이 없다!"); return; }
  if (p.currentHp >= p.maxHp) { flashMessage("HP가 이미 최대야!"); return; }
  state.inventory.potions -= 1;
  const heal = Math.floor(p.maxHp * 0.5);
  const before = p.currentHp;
  p.currentHp = Math.min(p.maxHp, p.currentHp + heal);
  const actual = p.currentHp - before;
  popHeal("player", actual);
  if ($("potions-badge")) $("potions-badge").textContent = state.inventory.potions;
  renderPlayer();
  renderParty();
  flashMessage(`💊 ${p.name}의 HP +${actual} 회복!  (남은 회복약: ${state.inventory.potions})`);
}

function queueMessage(text) { state.messageQueue.push({ type: "msg", text }); }
function queueAction(fn) { state.messageQueue.push({ type: "act", fn }); }
function startMessages() { state.awaitingTap = false; processNextMessage(); }

function processNextMessage() {
  if (state.messageQueue.length === 0) {
    $("message-box").classList.remove("tap");
    return;
  }
  const item = state.messageQueue.shift();
  if (item.type === "act") {
    item.fn();
    processNextMessage();
  } else {
    $("message-box").textContent = item.text;
    if (state.messageQueue.length > 0) {
      $("message-box").classList.add("tap");
      state.awaitingTap = true;
    } else {
      $("message-box").classList.remove("tap");
    }
  }
}

function advanceMessage() {
  if (state.awaitingTap) {
    state.awaitingTap = false;
    processNextMessage();
  }
}

async function showMessage(text, delay = 800) {
  $("message-box").textContent = text;

let dexCurrentFilter = "all";  // 현재 선택된 타입 필터

// 등급 정렬 우선순위 (낮을수록 먼저)
const RARITY_ORDER = { common: 0, rare: 1, legendary: 2 };

function sortByRarity(ids) {
  return [...ids].sort((a, b) => {
    const ra = RARITY_ORDER[MONSTERS[a].rarity || 'common'];
    const rb = RARITY_ORDER[MONSTERS[b].rarity || 'common'];
    if (ra !== rb) return ra - rb;
    // 같은 등급이면 원래 번호순 (mon_001 등)
    return a.localeCompare(b);
  });
}

// 카드 타입 색조 RGB (도감/교체 카드 공용)
const TYPE_RGB = { fire:'255,90,60', water:'37,99,235', grass:'78,194,78', electric:'245,197,24', dark:'139,92,246' };

function renderCollection() {
  $("collection-count").textContent = `${state.ownedMons.length} / ${ALL_MON_IDS.length}`;
  // 진행 바
  const pct = (state.ownedMons.length / ALL_MON_IDS.length) * 100;
  const fill = document.getElementById("dex-progress-fill");
  if (fill) fill.style.width = pct + "%";

  const grid = $("collection-grid");
  grid.innerHTML = "";

  // 필터 적용
  let filteredIds = (dexCurrentFilter === "all")
    ? ALL_MON_IDS
    : ALL_MON_IDS.filter(id => MONSTERS[id].type === dexCurrentFilter);

  // 등급 정렬 적용 (일반 → 레어 → 전설)
  filteredIds = sortByRarity(filteredIds);

  if (filteredIds.length === 0) {
    grid.innerHTML = '<div class="dex-empty">이 타입의 몬스터가 없습니다.</div>';
    return;
  }

  filteredIds.forEach(id => {
    const mon = MONSTERS[id];
    const owned = state.ownedMons.includes(id);
    const candyCount = state.candies[id] || 0;
    const card = document.createElement("div");
    const rgb = TYPE_RGB[mon.type] || '141,151,166';
    card.className = `collection-card rarity-${mon.rarity || 'common'} type-${mon.type}${owned ? '' : ' locked'}`;
    card.style.setProperty('--type', rgb);
    card.innerHTML = `
      <div class="cc-inner">
        ${owned ? `<div class="cc-corner"><span>${TYPES[mon.type].name}</span></div>` : ''}
        ${owned && candyCount > 0 ? `<div class="collection-candy">🍬 ${candyCount}</div>` : ''}
        <div class="cc-art"><img src="${IMAGES[id]}" alt="${owned ? mon.name : '???'}"></div>
        <div class="cc-name">${owned ? mon.name : '???'}</div>
      </div>
    `;
    if (owned) {
      card.onclick = () => openMonDetail(id);
    }
    grid.appendChild(card);
  });
}

  const row = document.getElementById("dex-filter-row");

      btn.classList.add("active");

}

// ===== 뽑기 시스템 =====
// 등급 확률 (단계 C 합의: 75/20/5)
const GACHA_RATES = { common: 75, rare: 20, legendary: 5 };
// 마지막으로 뽑은 타입 (같은 타입 2연속 차단용; 풀이 1타입만 남으면 자동 무시)
let lastGachaType = null;
// 뽑기 진행 중 플래그 (DOM disabled보다 빠르게 작동 - 동시 클릭 차단용)
let gachaInProgress = false;
// 진행 중 애니메이션 타임아웃 추적 (중첩 방지용)
let gachaAnimTimeouts = [];
function cancelGachaAnim() {
  gachaAnimTimeouts.forEach(id => clearTimeout(id));
  gachaAnimTimeouts = [];
  gachaInProgress = false;  // 화면 이탈 시 플래그 해제
  document.querySelectorAll(".gacha-screen-flash").forEach(el => el.remove());
}

function rollRarity() {
  const r = Math.random() * 100;
  if (r < GACHA_RATES.legendary) return "legendary";
  if (r < GACHA_RATES.legendary + GACHA_RATES.rare) return "rare";
  return "common";
}

function doGacha() {
  // 최우선 가드: 진행 중이면 즉시 차단 (DOM disabled보다 빠름)
  if (gachaInProgress) return;
  const cost = SHOP_PRICES.gacha;
  if (state.metaGems < cost) return;
  const btn = $("gacha-pull-btn");
  if (btn.disabled) return;

  // 가드 잠금: 다음 함수 호출은 여기서 차단됨
  gachaInProgress = true;
  btn.disabled = true;

  state.metaGems -= cost;

  // 등급 결정 → 해당 등급 풀에서 랜덤 (풀이 비면 fallback)
  let rarity = rollRarity();
  let pool = GACHA_POOL_IDS.filter(id => (MONSTERS[id].rarity || 'common') === rarity);
  if (pool.length === 0) {
    const fallbackOrder = ["common", "rare", "legendary"];
    for (const r of fallbackOrder) {
      pool = GACHA_POOL_IDS.filter(id => (MONSTERS[id].rarity || 'common') === r);
      if (pool.length > 0) { rarity = r; break; }
    }
  }
  if (pool.length === 0) {
    state.metaGems += cost;
    alert("뽑기 풀이 비어있습니다");
    btn.disabled = false;
    gachaInProgress = false;
    return;
  }

  // 같은 타입 2연속 방지: 직전 타입을 풀에서 제외 (단, 그러면 풀이 비는 경우 무시)
  let filteredPool = pool;
  if (lastGachaType) {
    const candidate = pool.filter(id => MONSTERS[id].type !== lastGachaType);
    if (candidate.length > 0) filteredPool = candidate;
    // 같은 타입만 남았으면 어쩔 수 없이 원본 풀 사용
  }

  const pulledId = pickRandom(filteredPool);
  lastGachaType = MONSTERS[pulledId].type;  // 다음 뽑기에 영향
  const isNew = !state.ownedMons.includes(pulledId);
  if (isNew) state.ownedMons.push(pulledId);
  else state.candies[pulledId] = (state.candies[pulledId] || 0) + 1;
  saveProgress();
  updateGachaUI();  // 잼 표시는 즉시 갱신

  playGachaAnimation(pulledId, isNew, rarity);
}

// ===== 뽑기 연출 (단계별) =====
function playGachaAnimation(monId, isNew, rarity) {
  cancelGachaAnim();  // 이전 애니메이션 잔존분 정리
  const area = $("gacha-pull-area");

  // 1단계: 흔들림 (전설 1.4초 / 레어 1.0초 / 일반 0.7초)
  const suspenseTime = rarity === "legendary" ? 1400 : rarity === "rare" ? 1000 : 700;
  area.classList.add("suspense");
  area.innerHTML = `
    <div style="text-align:center; position:relative; z-index:2;">
      <div class="gacha-orb gacha-orb-shake"></div>
    </div>
  `;

  const t1 = setTimeout(() => {
    // 2단계: 폭발 + 광선
    area.innerHTML = `
      ${rarity !== "common" ? `<div class="gacha-rays ${rarity === "rare" ? "rare" : ""}"></div>` : ""}
      <div class="gacha-burst ${rarity}"></div>
    `;
    // 전설은 화면 전체 플래시
    if (rarity === "legendary") {
      const flash = document.createElement("div");
      flash.className = "gacha-screen-flash";
      document.body.appendChild(flash);
      const tFlash = setTimeout(() => flash.remove(), 700);
      gachaAnimTimeouts.push(tFlash);
    }

    // 3단계: 카드 등장
    const cardDelay = rarity === "legendary" ? 900 : rarity === "rare" ? 700 : 500;
    const t2 = setTimeout(() => {
      renderGachaResult(monId, isNew, rarity);
      gachaInProgress = false;  // 결과 표시 완료, 다음 뽑기 허용
      $("gacha-pull-btn").disabled = state.metaGems < SHOP_PRICES.gacha;
    }, cardDelay);
    gachaAnimTimeouts.push(t2);
  }, suspenseTime);
  gachaAnimTimeouts.push(t1);
}

function renderGachaResult(monId, isNew, rarityOverride) {
  const mon = MONSTERS[monId];
  const rarityClass = rarityOverride || mon.rarity || 'common';
  const rarityLabel = rarityClass === 'legendary' ? '★ 전설' : rarityClass === 'rare' ? '◆ 레어' : '일반';
  $("gacha-pull-area").classList.remove("suspense");
  $("gacha-pull-area").innerHTML = `
    ${rarityClass !== "common" ? `<div class="gacha-rays ${rarityClass === "rare" ? "rare" : ""}" style="opacity:0.6;"></div>` : ""}
    <div class="gacha-result-card rarity-${rarityClass}" style="position:relative; z-index:2;">
      ${isNew
        ? '<div class="gacha-new-badge">NEW!</div>'
        : `<div class="gacha-candy-badge">🍬 사탕 +1 (보유 ${state.candies[monId]})</div>`}
      <div class="gacha-rarity-label rarity-${rarityClass}">${rarityLabel}</div>
      <img src="${IMAGES[monId]}" alt="${mon.name}">
      <div class="gacha-result-name">${mon.name}</div>
      <span class="gacha-result-type type-${mon.type}">${TYPES[mon.type].name}</span>
    </div>
  `;
}

function updateGachaUI() {
  $("gacha-gems").textContent = state.metaGems;
  const btn = $("gacha-pull-btn");
  const canAfford = state.metaGems >= SHOP_PRICES.gacha;
  btn.disabled = !canAfford;
  $("gacha-pull-label").textContent = canAfford
    ? `1회 뽑기 (${SHOP_PRICES.gacha} 💎)`
    : `잼 부족 (${state.metaGems} / ${SHOP_PRICES.gacha})`;
}
